<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Eşyamın Hayatı</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { overscroll-behavior: none; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }

    .app {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, var(--glow1) 0%, transparent 24%),
        radial-gradient(circle at bottom left, var(--glow2) 0%, transparent 20%),
        var(--bg);
      transition: background .25s ease, color .25s ease;
    }

    .topbar {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display:flex; align-items:center; gap:10px;
      position:sticky; top:0; z-index:40;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }

    .container { padding: 18px; }

    .hero, .card, .mini, .modal, .section {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }

    .hero { border-radius: 22px; padding: 16px; margin-bottom: 14px; cursor: pointer; }
    .hero-grid { display:grid; grid-template-columns: 76px 1fr; gap:14px; align-items:center; }
    .hero-icon {
      width:76px; height:76px; border-radius:24px;
      display:flex; align-items:center; justify-content:center;
      font-size:38px;
      background: linear-gradient(135deg, var(--accentSoft), var(--card2));
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    }
    .hero-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .summary-stack { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .summary-pill {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background: color-mix(in srgb, var(--card2) 86%, transparent);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 10px;
      font-size:12px;
      color:var(--text);
    }
    .summary-pill strong { font-size:12px; }
    .summary-total { margin-top:8px; font-size:13px; font-weight:800; color:var(--text); }

    .theme-title-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
      padding:0 2px;
      cursor:pointer;
    }
    .theme-title-text {
      font-size:20px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .theme-section-title {
      font-size: 14px; font-weight: 700; margin: 14px 0 8px; color: var(--muted);
    }
    .theme-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .theme-card {
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      background: var(--card2);
      cursor:pointer;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .theme-card.active { outline: 2px solid var(--accent); }
    .theme-preview {
      width:54px; height:54px; border-radius:14px; flex-shrink:0;
      border:1px solid rgba(255,255,255,.14);
    }

    .color-lab {
      background: var(--card2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-top:12px;
    }

    .nature-grid {
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:8px;
      margin-top:12px;
    }

    .nature-chip {
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:var(--card);
      cursor:pointer;
      display:flex;
      gap:10px;
      align-items:center;
      min-height:58px;
    }
    .nature-chip.active { outline:2px solid var(--accent); }
    .nature-swatch {
      width:26px; height:26px; border-radius:999px; flex-shrink:0;
      border:1px solid rgba(255,255,255,.18);
    }

    .scene-swipe-wrap {
      position:relative;
      overflow:hidden;
      border-radius:22px;
      margin-bottom:14px;
    }
    .scene-swipe-actions {
      position:absolute;
      inset:0 0 0 auto;
      width:176px;
      display:flex;
      align-items:stretch;
      justify-content:flex-end;
      gap:8px;
      padding:0 0 0 8px;
    }
    .scene-action-btn {
      border:none;
      width:84px;
      border-radius:18px;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    .scene-action-edit { background: linear-gradient(135deg, #475569, #334155); }
    .scene-action-delete { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .scene-swipe-card {
      position:relative;
      z-index:2;
      transition:transform .22s ease;
      margin-bottom:0;
    }
    .scene-swipe-card.revealed {
      transform:translateX(-176px);
    }

    .card { border-radius: 18px; padding: 16px; margin-bottom: 12px; cursor:pointer; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .muted { color: var(--muted); font-size:12px; }

    .btn {
      border:none; border-radius:12px; padding:10px 14px; cursor:pointer; font-weight:700;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff;
    }
    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color:#fff;
    }
    .btn-dark {
      background: var(--card2); color: var(--text); border:1px solid var(--line);
    }

    .scene-shell {
      height: calc(100vh - 57px);
      overflow: auto;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accentSoft) 60%, var(--card)) 0%, var(--card2) 100%);
      position: relative;
      -webkit-overflow-scrolling: touch;
    }
    .scene-shell.lock-scroll { overflow: hidden; }

    .scene {
      min-width: 100%;
      min-height: 1500px;
      position: relative;
      overflow: visible;
      transform-origin: top left;
      will-change: transform;
    }

    .scale-bar {
      position: sticky;
      top: 57px;
      z-index: 35;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }

    .item-list {
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .item-node {
      position:relative;
      cursor:grab;
      z-index:4;
      touch-action:pan-y;
      user-select:none;
      width:100%;
      transition: transform .08s ease, opacity .12s ease;
    }
    .item-node.dragging {
      z-index:20;
      cursor:grabbing;
      opacity:.92;
      transform:scale(1.01);
    }

    .item-banner {
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border:1px solid var(--line);
      border-radius:20px;
      padding:12px 14px;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      min-height:112px;
    }
    .item-banner-icon {
      width:84px;
      height:84px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:16px;
      background:linear-gradient(135deg, var(--accentSoft), var(--card2));
      border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
      overflow:hidden;
    }
    .item-banner-body {
      flex:1;
      min-width:0;
      text-align:left;
    }
    .item-banner-name {
      font-size:15px;
      font-weight:800;
      color:var(--text);
      margin-bottom:6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .item-banner-line {
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top:3px;
    }
    .item-banner-meta-row {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }
    .item-meta-chip {
      border:1px solid var(--line);
      background:color-mix(in srgb, var(--card2) 88%, transparent);
      border-radius:999px;
      padding:6px 10px;
      font-size:11px;
      color:var(--text);
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .item-banner-value {
      margin-top:8px;
      font-size:13px;
      font-weight:800;
      color:var(--text);
    }

    .section { border-radius:18px; padding:16px; margin-bottom:14px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .mini { border-radius:14px; padding:12px 14px; }

    .modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,.72);
      display:flex; align-items:center; justify-content:center; padding:16px; z-index:999;
      backdrop-filter: blur(10px);
    }
    .modal {
      width:100%; max-width:760px; max-height:88vh; overflow:auto;
      border-radius:24px; padding:20px;
    }

    input, select, textarea {
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line);
      background: var(--card2); color: var(--text); outline:none;
      font-size:16px;
    }
    textarea { min-height:84px; resize:vertical; }
    label { display:block; margin-bottom:10px; }
    h1,h2,h3,p { margin:0; }

    .empty {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:14px;
    }

    .doc-pill {
      display:inline-block;
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      font-size:11px;
      margin:4px 6px 0 0;
      cursor:pointer;
    }

    .svg-icon {
      width: 104px;
      height: 104px;
      margin: 0 auto;
      display:block;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.28));
    }

    .item-banner .svg-icon {
      width:72px;
      height:72px;
      margin:0;
    }

    .service-card {
      display:block;
      background: var(--card2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-top:8px;
    }

    .file-view {
      width:100%;
      min-height:420px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    @media (max-width: 760px) {
      .grid2, .grid3, .theme-grid, .nature-grid { grid-template-columns:1fr; }
      .item-banner-icon { width:72px; height:72px; }
      .scene-swipe-actions { width:160px; }
      .scene-swipe-card.revealed { transform:translateX(-160px); }
      .scene-action-btn { width:76px; }
    }
  </style>
</head>

function applyTheme(theme){
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => {
    if(k !== "label") root.style.setProperty(`--${k}`, v);
  });
}

function formatCurrency(value){
  const n = Number(value || 0);
  if (!n) return "-";
  return "₺" + n.toLocaleString("tr-TR");
}

function parseGuaranteeMonths(text=""){
  const raw = String(text || "").toLowerCase().trim();
  if (!raw) return 0;
  const n = parseInt(raw.match(/\d+/)?.[0] || "0", 10);
  if (!n) return 0;
  if (raw.includes("yıl") || raw.includes("sene")) return n * 12;
  return n;
}

function getGuaranteeRemainingLabel(item){
  const months = parseGuaranteeMonths(item?.guaranteeDuration || "");
  if (!months || !item?.acquisitionDate) return "Garanti: Belirsiz";
  const start = new Date(item.acquisitionDate);
  if (Number.isNaN(start.getTime())) return "Garanti: Belirsiz";
  const end = new Date(start);
  end.setMonth(end.getMonth() + months);
  const now = new Date();
  const diff = end.getTime() - now.getTime();
  if (diff <= 0) return "Garanti: Bitti";
  const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
  if (days < 30) return `Garanti: ${days} gün kaldı`;
  const remMonths = Math.ceil(days / 30);
  return `Garanti: ${remMonths} ay kaldı`;
}

function buildCategorySummary(items=[]){
  const map = {};
  items.forEach(item => {
    const key = item.category || item.type || "Diğer";
    if (!map[key]) map[key] = { count:0, value:0 };
    map[key].count += 1;
    map[key].value += Number(item.purchasePrice || 0);
  });
  return Object.entries(map)
    .sort((a,b) => b[1].value - a[1].value || b[1].count - a[1].count)
    .map(([name, meta]) => ({ name, ...meta }));
}

function Modal({ title, onClose, children }){
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <div className="row" style={{marginBottom:16}}>
          <h3>{title}</h3>
          <button className="btn btn-dark" onClick={onClose}>Kapat</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function TopBar({ title, sub, onBack, right }){
  return (
    <div className="topbar">
      {onBack && <button className="btn btn-dark" onClick={onBack}>←</button>}
      <div style={{flex:1}}>
        <div style={{fontSize:17,fontWeight:700}}>{title}</div>
        {sub && <div className="muted" style={{marginTop:2}}>{sub}</div>}
      </div>
      {right}
    </div>
  );
}

function ItemForm({ form, setForm }){
  const categoryOptions = Object.keys(ITEM_CATEGORIES);
  const itemOptions = form.category ? ITEM_CATEGORIES[form.category] : [];
  const acquisitionMeta = ACQUISITION_OPTIONS[form.acquisitionType] || ACQUISITION_OPTIONS["Satın alındı"];

  function setField(key, value){
    setForm(prev => {
      const next = { ...prev, [key]: value };
      const isPriceMode =
        next.acquisitionType === "Satın alındı" ||
        next.acquisitionType === "İkinci el alındı" ||
        next.acquisitionType === "Kiralandı";

      if (isPriceMode) {
        const real = parseFloat(String(next.realPrice || "").replace(",", ".")) || 0;
        const discount = parseFloat(String(next.discountAmount || "").replace(",", ".")) || 0;
        const total = Math.max(real - discount, 0);
        next.purchasePrice = total ? String(total) : "";
      }
      return next;
    });
  }

  function handleCategoryChange(value){
    setForm(prev => ({
      ...prev,
      category:value,
      selectedName:"",
      customName:"",
      name:"",
      type:""
    }));
  }

  function handleItemSelect(value){
    const found = (ITEM_CATEGORIES[form.category] || []).find(x => x.name === value);
    if (value === "Özel Eşya") {
      setForm(prev => ({ ...prev, selectedName:value, name:"", type:"Diğer" }));
      return;
    }
    setForm(prev => ({
      ...prev,
      selectedName:value,
      name:found ? found.name : value,
      type:found ? found.type : prev.type
    }));
  }

  function handleCustomName(value){
    setForm(prev => ({ ...prev, customName:value, name:value }));
  }

  function handleInvoiceFiles(e){
    const files = Array.from(e.target.files || []).map(f => ({
      id: mkid(),
      name: f.name,
      type: "Fatura",
      url: URL.createObjectURL(f)
    }));
    setForm(prev => ({ ...prev, invoiceFiles: files }));
  }

  const isPriceMode =
    form.acquisitionType === "Satın alındı" ||
    form.acquisitionType === "İkinci el alındı" ||
    form.acquisitionType === "Kiralandı";

  const isGiftMode =
    form.acquisitionType === "Hediye geldi" ||
    form.acquisitionType === "Miras kaldı" ||
    form.acquisitionType === "İş yerinden verildi";

  return <>
    <div className="section" style={{marginBottom:10}}>
      <div style={{fontWeight:700,marginBottom:10}}>Kategori ve Eşya Seçimi</div>

      <div className="grid2">
        <label>
          <div className="muted" style={{marginBottom:4}}>Kategori</div>
          <select value={form.category} onChange={e=>handleCategoryChange(e.target.value)}>
            <option value="">Seçiniz</option>
            {categoryOptions.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </label>

        <label>
          <div className="muted" style={{marginBottom:4}}>Eşya</div>
          <select value={form.selectedName} onChange={e=>handleItemSelect(e.target.value)} disabled={!form.category}>
            <option value="">Seçiniz</option>
            {itemOptions.map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
          </select>
        </label>
      </div>

      {form.selectedName==="Özel Eşya" && (
        <label>
          <div className="muted" style={{marginBottom:4}}>Özel Eşya Adı</div>
          <input value={form.customName} onChange={e=>handleCustomName(e.target.value)} placeholder="Listede olmayan eşya adı" />
        </label>
      )}
    </div>

    <div className="grid2">
      <label><div className="muted" style={{marginBottom:4}}>Eşya Adı</div><input value={form.name} readOnly /></label>
      <label><div className="muted" style={{marginBottom:4}}>Tür</div><input value={form.type} readOnly /></label>
      <label><div className="muted" style={{marginBottom:4}}>Marka</div><input value={form.brand} onChange={e=>setField("brand",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>Model adı</div><input value={form.modelName || ""} onChange={e=>setField("modelName",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>Model numarası</div><input value={form.modelNumber || ""} onChange={e=>setField("modelNumber",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>Seri no</div><input value={form.serialNo || ""} onChange={e=>setField("serialNo",e.target.value)} /></label>

      <label>
        <div className="muted" style={{marginBottom:4}}>Renk</div>
        <select value={form.color} onChange={e=>setField("color",e.target.value)}>
          <option value="">Seçiniz</option>
          {COLOR_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </label>

      <label>
        <div className="muted" style={{marginBottom:4}}>Edinme şekli</div>
        <select value={form.acquisitionType} onChange={e=>setField("acquisitionType",e.target.value)}>
          {Object.keys(ACQUISITION_OPTIONS).map(k => <option key={k} value={k}>{k}</option>)}
        </select>
      </label>

      <label><div className="muted" style={{marginBottom:4}}>{acquisitionMeta.dateLabel}</div><input value={form.acquisitionDate} onChange={e=>setField("acquisitionDate",e.target.value)} /></label>

      {isPriceMode ? (
        <>
          <label><div className="muted" style={{marginBottom:4}}>Gerçek Fiyat</div><input value={form.realPrice || ""} onChange={e=>setField("realPrice",e.target.value)} placeholder="Örn: 50000" /></label>
          <label><div className="muted" style={{marginBottom:4}}>İndirim Tutarı</div><input value={form.discountAmount || ""} onChange={e=>setField("discountAmount",e.target.value)} placeholder="Örn: 5000" /></label>
          <label><div className="muted" style={{marginBottom:4}}>Satın alma değeri</div><input value={form.purchasePrice || ""} readOnly /></label>
        </>
      ) : (
        <label><div className="muted" style={{marginBottom:4}}>{acquisitionMeta.valueLabel}</div><input value={form.purchasePrice} onChange={e=>setField("purchasePrice",e.target.value)} /></label>
      )}

      <label><div className="muted" style={{marginBottom:4}}>Garanti Süresi</div><input value={form.guaranteeDuration || ""} onChange={e=>setField("guaranteeDuration",e.target.value)} placeholder="24 ay / 2 yıl" /></label>

      <label>
        <div className="muted" style={{marginBottom:4}}>Ek Garanti Yapıldımı</div>
        <select value={form.extraWarranty || "Hayır"} onChange={e=>setField("extraWarranty",e.target.value)}>
          <option value="Hayır">Hayır</option>
          <option value="Evet">Evet</option>
        </select>
      </label>
    </div>

    {isGiftMode && (
      <div className="grid2">
        <label><div className="muted" style={{marginBottom:4}}>{acquisitionMeta.personLabel}</div><input value={form.sourcePerson || ""} onChange={e=>setField("sourcePerson",e.target.value)} /></label>
        <label><div className="muted" style={{marginBottom:4}}>{acquisitionMeta.reasonLabel}</div><input value={form.sourceReason || ""} onChange={e=>setField("sourceReason",e.target.value)} /></label>
      </div>
    )}

    {form.extraWarranty === "Evet" && (
      <label>
        <div className="muted" style={{marginBottom:4}}>Ek garanti koşulları</div>
        <textarea value={form.extraWarrantyTerms || ""} onChange={e=>setField("extraWarrantyTerms",e.target.value)} placeholder="Elle doldurunuz" />
      </label>
    )}

    <div className="section" style={{marginTop:10}}>
      <div style={{fontWeight:700,marginBottom:8}}>Fatura Ekle</div>
      <label>
        <div className="muted" style={{marginBottom:4}}>Fatura Dosyaları</div>
        <input type="file" multiple onChange={handleInvoiceFiles} />
      </label>
      <div>
        {(form.invoiceFiles || []).map(f => <span key={f.id} className="doc-pill">{f.name}</span>)}
      </div>
    </div>
  </>;
}

function SceneSwipeCard({ scene, onOpen, onEdit, onDelete, isRevealed, onReveal, onClose }) {
  const touchRef = useRef({ startX:0, startY:0 });
  const items = scene.subs.flatMap(sub => sub.items || []);
  const summary = buildCategorySummary(items);

  function onTouchStart(e){
    const t = e.touches[0];
    touchRef.current = { startX:t.clientX, startY:t.clientY };
  }

  function onTouchEnd(e){
    const t = e.changedTouches[0];
    const dx = t.clientX - touchRef.current.startX;
    const dy = Math.abs(t.clientY - touchRef.current.startY);
    if (dy > 50) return;
    if (dx < -40) onReveal(scene.id);
    if (dx > 40) onClose();
  }

  return (
    <div className="scene-swipe-wrap">
      <div className="scene-swipe-actions">
        <button className="scene-action-btn scene-action-edit" onClick={onEdit}>Düzenle</button>
        <button className="scene-action-btn scene-action-delete" onClick={onDelete}>Sil</button>
      </div>
      <div
        className={`hero scene-swipe-card ${isRevealed ? 'revealed' : ''}`}
        onClick={onOpen}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div className="hero-grid">
          <div className="hero-icon">{detectSceneIcon(scene.name)}</div>
          <div>
            <div style={{fontSize:20,fontWeight:700}}>{scene.name}</div>
            <div className="muted" style={{marginTop:4}}>{scene.subs.length} alt başlık · {items.length} eşya</div>
            {!!summary.length && <div className="summary-stack">
              {summary.slice(0,3).map(row => (
                <div className="summary-pill" key={row.name}>
                  <span>{row.name}</span>
                  <strong>{row.count} adet · {formatCurrency(row.value)}</strong>
                </div>
              ))}
              <div className="summary-total">Genel toplam: {formatCurrency(items.reduce((a,b)=>a+Number(b.purchasePrice||0),0))}</div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
}

  );
}

function ItemSortableCard({ item, isDragging, onPointerDown, onTouchStart, onOpen }) {
  return (
    <div
      className={`item-node ${isDragging ? "dragging" : ""}`}
      onMouseDown={onPointerDown}
      onTouchStart={onTouchStart}
      onDoubleClick={onOpen}
      onClick={onOpen}
    >
      <div className="item-banner">
        <div className="item-banner-icon">
          <ProductIcon item={item} />
        </div>
        <div className="item-banner-body">
          <div className="item-banner-name">{item.name || "Eşya"}</div>
          <div className="item-banner-line">Kategori: {item.category || item.type || "-"}</div>
          <div className="item-banner-line">Tür: {item.name || "-"}</div>
          <div className="item-banner-line">Model No: {item.modelNumber || "-"}</div>
          <div className="item-banner-meta-row">
            <span className="item-meta-chip">{item.modelName ? `Model: ${item.modelName}` : "Model: -"}</span>
            <span className="item-meta-chip">{getGuaranteeRemainingLabel(item)}</span>
            <span className="item-meta-chip">{item.brand ? `Marka: ${item.brand}` : "Marka: -"}</span>
          </div>
          <div className="item-banner-value">Değer: {formatCurrency(item.purchasePrice)}</div>
        </div>
      </div>
    </div>
  );
}

function App(){

  const [themeKey, setThemeKey] = useState("royal_navy");
  const [themeLibraryOpen, setThemeLibraryOpen] = useState(false);
  const [customTheme, setCustomTheme] = useState({ hue:220, sat:82, light:58 });
  const [selectedNature, setSelectedNature] = useState(null);

  const [scenes,setScenes]=useState(starter);
  const [view,setView]=useState("home");
  const [activeSceneId,setActiveSceneId]=useState("");
  const [activeRoomId,setActiveRoomId]=useState("");
  const [activeItemId,setActiveItemId]=useState("");

  const [modal,setModal]=useState(null);
  const [sceneName,setSceneName]=useState("");
  const [sceneEditName,setSceneEditName]=useState("");
  const [roomName,setRoomName]=useState("");
  const [itemForm,setItemForm]=useState(emptyItemForm());
  const [editForm,setEditForm]=useState(emptyItemForm());
  const [serviceForm,setServiceForm]=useState(emptyServiceForm());

  const [draggingId,setDraggingId]=useState(null);
  const [sceneScale, setSceneScale] = useState(1);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [sceneDeleteConfirm, setSceneDeleteConfirm] = useState(null);
  const [filePreview, setFilePreview] = useState(null);
  const [revealedSceneId, setRevealedSceneId] = useState(null);
  const [revealedRoomId, setRevealedRoomId] = useState(null);
  const [roomDeleteConfirm, setRoomDeleteConfirm] = useState(null);

  const sceneRef=useRef(null);
  const shellRef=useRef(null);
  const colorBarRef=useRef(null);
  const pinchRef=useRef({ distance: null, startScale: 1 });
  const dragIndexRef = useRef(null);
  const longPressTimerRef = useRef(null);

  useEffect(() => {
    let applied = false;
    for (const group of Object.values(THEME_GROUPS)) {
      if (group[themeKey]) {
        applyTheme(group[themeKey]);
        applied = true;
      }
    }
    if (!applied && themeKey === "custom") {
      applyTheme(hslTheme(customTheme.hue, customTheme.sat, customTheme.light));
    }
  }, [themeKey, customTheme]);

  const activeScene = useMemo(() => scenes.find(s => s.id === activeSceneId) || null, [scenes, activeSceneId]);
  const allItems = useMemo(() => scenes.flatMap(s => s.subs.flatMap(r => r.items)), [scenes]);
  const totalValue = useMemo(
    () => scenes.flatMap(s => s.subs.flatMap(r => r.items)).reduce((a,i)=>a+(parseFloat(i.purchasePrice)||0),0).toLocaleString("tr-TR"),
    [scenes]
  );
  const activeRoom = useMemo(() => activeScene ? activeScene.subs.find(r => r.id === activeRoomId) || null : null, [activeScene, activeRoomId]);
  const activeItem = useMemo(() => activeRoom ? activeRoom.items.find(i => i.id === activeItemId) || null : null, [activeRoom, activeItemId]);

  function goScene(id){ setActiveSceneId(id); setView("scene"); setRevealedSceneId(null); }
  function goRoom(id){ setActiveRoomId(id); setView("room"); }
  function goItem(id){ setActiveItemId(id); setView("item"); }

  function addScene(){
    if(!sceneName.trim()) return;
    const next={id:mkid(),name:sceneName.trim(),subs:[]};
    setScenes(prev=>[...prev,next]);
    setSceneName("");
    setModal(null);
  }

  function saveSceneEdit(){
    if(!sceneEditName.trim() || !activeSceneId) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,name:sceneEditName.trim()}:s));
    setModal(null);
  }

  function deleteScene(){
    if(!sceneDeleteConfirm) return;
    setScenes(prev=>prev.filter(s=>s.id!==sceneDeleteConfirm));
    setSceneDeleteConfirm(null);
    setView("home");
    setActiveSceneId("");
    setRevealedSceneId(null);
  }


  function deleteRoom(){
    if(!roomDeleteConfirm || !activeSceneId) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:s.subs.filter(r=>r.id!==roomDeleteConfirm)}:s));
    setRoomDeleteConfirm(null);
    setRevealedRoomId(null);
  }

  function editRoom(room){
    setActiveRoomId(room.id);
    setRoomName(room.name);
    setModal("roomEdit");
  }

  function saveRoomEdit(){
    if(!roomName.trim() || !activeSceneId || !activeRoomId) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:s.subs.map(r=>r.id===activeRoomId?{...r,name:roomName.trim()}:r)}:s));
    setRoomName("");
    setModal(null);
    setRevealedRoomId(null);
  }

  function addRoom(){
    if(!roomName.trim()||!activeSceneId) return;
    const next={id:mkid(),name:roomName.trim(),items:[]};
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:[...s.subs,next]}:s));
    setRoomName("");
    setModal(null);
  }

  function addItem(){
    if(!itemForm.name.trim()||!activeSceneId||!activeRoomId) return;
    const pos = activeRoom ? defaultPos(activeRoom.items.length) : {x:50,y:50};
    const next={id:mkid(), ...itemForm, x:pos.x, y:pos.y, docs:[...(itemForm.invoiceFiles||[])], services:[]};
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>r.id===activeRoomId?{...r,items:[...r.items,next]}:r)
    }:s));
    setItemForm(emptyItemForm());
    setModal(null);
  }

  function updateItem(itemId, updater){
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>r.id===activeRoomId?{
        ...r,
        items:r.items.map(i=>i.id===itemId?updater(i):i)
      }:r)
    }:s));
  }

  function deleteActiveItem(){
    if(!activeItem) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>r.id===activeRoomId?{
        ...r,
        items:r.items.filter(i=>i.id!==activeItem.id)
      }:r)
    }:s));
    setDeleteConfirm(null);
    setView("room");
  }

  function saveEdit(){
    if(!activeItem || !editForm.name.trim()) return;
    const mergedDocs = [...(activeItem.docs || [])];
    (editForm.invoiceFiles || []).forEach(f => mergedDocs.push(f));
    updateItem(activeItem.id, i => ({ ...i, ...editForm, docs: mergedDocs }));
    setModal(null);
  }

  function addServiceRecord(){
    if(!activeItem || !serviceForm.date || !serviceForm.status) return;
    updateItem(activeItem.id, i => {
      const nextServices = [...(i.services || []), { id: mkid(), ...serviceForm }];
      let updated = { ...i, services: nextServices };
      if (serviceForm.changed) {
        updated = {
          ...updated,
          name: serviceForm.changedProductName || updated.name,
          modelName: serviceForm.changedModelName || updated.modelName,
          serialNo: serviceForm.changedSerialNo || updated.serialNo
        };
      }
      return updated;
    });
    setServiceForm(emptyServiceForm());
  }

  function reorderRoomItems(fromIndex, toIndex){
    if (fromIndex === toIndex || fromIndex == null || toIndex == null) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>{
        if (r.id !== activeRoomId) return r;
        const nextItems = [...r.items];
        const [moved] = nextItems.splice(fromIndex, 1);
        nextItems.splice(toIndex, 0, moved);
        return { ...r, items: nextItems };
      })
    }:s));
  }

  function startDrag(itemId, index, e){
    if (e.touches && e.touches.length === 2) return;
    const activate = () => {
      dragIndexRef.current = index;
      setDraggingId(itemId);
    };
    if (e.touches) {
      longPressTimerRef.current = setTimeout(activate, 180);
      return;
    }
    e.preventDefault();
    activate();
  }

  function moveDrag(e){
    if(!draggingId || !activeRoom?.items?.length) return;
    const point = e.touches ? e.touches[0] : e;
    e.preventDefault && e.preventDefault();
    const els = Array.from(document.querySelectorAll('[data-item-sort-index]'));
    if (!els.length) return;
    const y = point.clientY;
    let targetIndex = dragIndexRef.current;
    els.forEach((el, idx) => {
      const rect = el.getBoundingClientRect();
      if (y > rect.top && y < rect.bottom) targetIndex = idx;
    });
    if (targetIndex !== dragIndexRef.current) {
      reorderRoomItems(dragIndexRef.current, targetIndex);
      dragIndexRef.current = targetIndex;
    }
  }

  function endDrag(){
    clearTimeout(longPressTimerRef.current);
    longPressTimerRef.current = null;
    setDraggingId(null);
    dragIndexRef.current = null;
  }

  function handleItemDoubleClick(itemId){
    if (!draggingId) goItem(itemId);
  }

  function updateHueFromClientX(clientX){
    const rect = colorBarRef.current.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    setSelectedNature(null);
    setCustomTheme(prev => ({ ...prev, hue: Math.round(ratio * 360) }));
    setThemeKey("custom");
  }

  function chooseNature(p){
    setSelectedNature(p.name);
    setCustomTheme({ hue:p.hue, sat:p.sat, light:p.light });
    setThemeKey("custom");
  }

  function distance(t1, t2){
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function onSceneTouchStart(e){
    if (e.touches.length === 2) {
      pinchRef.current.distance = distance(e.touches[0], e.touches[1]);
      pinchRef.current.startScale = sceneScale;
      setDraggingId(null);
      return;
    }
  }

  function onSceneTouchMove(e){
    if (e.touches.length === 2 && pinchRef.current.distance) {
      const newDistance = distance(e.touches[0], e.touches[1]);
      const next = Math.max(0.6, Math.min(2.4, pinchRef.current.startScale * (newDistance / pinchRef.current.distance)));
      setSceneScale(next);
      return;
    }
    moveDrag(e);
  }

  function onSceneTouchEnd(e){
    if (e.touches.length < 2) pinchRef.current.distance = null;
    endDrag();
  }

  const activeItemMeta = activeItem ? (ACQUISITION_OPTIONS[activeItem.acquisitionType] || ACQUISITION_OPTIONS["Satın alındı"]) : null;

  return <div className="app" onClick={()=>{ if(revealedSceneId) setRevealedSceneId(null); if(revealedRoomId) setRevealedRoomId(null); }}>
    {view==="home" && <>
      <TopBar
        title="Eşyamın Hayatı"
        sub={`${allItems.length} eşya · ₺${totalValue}`}
        right={<button className="btn btn-primary" onClick={(e)=>{ e.stopPropagation(); setModal("scene"); }}>+ Başlık</button>}
      />

      <div className="container">
        <div className="theme-title-row" onClick={()=>setThemeLibraryOpen(v=>!v)}>
          <div>
            <div className="theme-title-text">Tema</div>
            <div className="section-strip-sub">Tema alanını açmak için dokun</div>
          </div>
          <button className="btn btn-dark">{themeLibraryOpen ? "Kapat" : "Aç"}</button>
        </div>

        {themeLibraryOpen && <div className="hero" style={{cursor:"default"}}>
          {Object.entries(THEME_GROUPS).map(([groupName, group]) => (
            <div key={groupName}>
              <div className="theme-section-title">{groupName}</div>
              <div className="theme-grid">
                {Object.entries(group).map(([key, theme]) => (
                  <div key={key} className={`theme-card ${themeKey===key ? 'active' : ''}`} onClick={()=>setThemeKey(key)}>
                    <div className="theme-preview" style={{background:`linear-gradient(135deg, ${theme.accent}, ${theme.accent2})`}} />
                    <div>
                      <div style={{fontWeight:700}}>{theme.label}</div>
                      <div className="muted">{groupName}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}

          <div className="color-lab">
            <div style={{fontWeight:700}}>Doğadaki Renkler ve Alt Tonları</div>
            <div className="muted" style={{marginTop:4}}>Beyaz, siyah, kahve, sarı, yeşil, kırmızı, mavi ve alt tonları eklendi.</div>

            <div
              ref={colorBarRef}
              style={{
                width:"100%",
                height:"42px",
                borderRadius:"999px",
                position:"relative",
                cursor:"crosshair",
                border:"1px solid rgba(255,255,255,.18)",
                background:"linear-gradient(90deg,hsl(0 95% 58%),hsl(15 95% 58%),hsl(30 95% 58%),hsl(45 95% 58%),hsl(60 95% 58%),hsl(90 90% 50%),hsl(120 78% 46%),hsl(150 75% 44%),hsl(180 82% 44%),hsl(210 85% 56%),hsl(240 85% 62%),hsl(270 82% 62%),hsl(300 80% 60%),hsl(330 82% 60%),hsl(360 95% 58%))"
              }}
              onPointerDown={(e)=>updateHueFromClientX(e.clientX)}
              onPointerMove={(e)=>{ if(e.buttons===1) updateHueFromClientX(e.clientX); }}
              onTouchStart={(e)=>{ if(e.touches[0]) updateHueFromClientX(e.touches[0].clientX); }}
              onTouchMove={(e)=>{ if(e.touches[0]) updateHueFromClientX(e.touches[0].clientX); }}
            >
              <div
                style={{
                  position:"absolute",
                  top:"50%",
                  left:`${(customTheme.hue/360)*100}%`,
                  transform:"translate(-50%,-50%)",
                  width:"22px",
                  height:"22px",
                  borderRadius:"999px",
                  border:"3px solid #fff",
                  boxShadow:"0 0 0 2px rgba(0,0,0,.25)",
                  background:`hsl(${customTheme.hue} ${customTheme.sat}% ${customTheme.light}%)`
                }}
              />
            </div>

            <div className="nature-grid">
              {NATURE_PALETTE.map(p => (
                <div key={p.name} className={`nature-chip ${selectedNature===p.name ? 'active' : ''}`} onClick={()=>chooseNature(p)}>
                  <div className="nature-swatch" style={{ background:`hsl(${p.hue} ${p.sat}% ${p.light}%)` }} />
                  <div>
                    <div style={{fontWeight:700}}>{p.name}</div>
                    <div className="muted">{p.hue}° ton</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>}

        {scenes.map(s =>
          <div key={s.id} onClick={(e)=>e.stopPropagation()}>
            <SceneSwipeCard
              scene={s}
              isRevealed={revealedSceneId===s.id}
              onReveal={(id)=>setRevealedSceneId(id)}
              onClose={()=>setRevealedSceneId(null)}
              onOpen={()=>goScene(s.id)}
              onEdit={()=>{
                setActiveSceneId(s.id);
                setSceneEditName(s.name);
                setModal("sceneEdit");
              }}
              onDelete={()=>setSceneDeleteConfirm(s.id)}
            />
          </div>
        )}
      </div>

      {modal==="scene" &&
        <Modal title="Yeni Başlık" onClose={()=>setModal(null)}>
          <label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneName} onChange={e=>setSceneName(e.target.value)} /></label>
          <button className="btn btn-primary" style={{width:"100%"}} onClick={addScene}>Oluştur</button>
        </Modal>
      }

      {modal==="sceneEdit" &&
        <Modal title="Ana Başlığı Düzenle" onClose={()=>setModal(null)}>
          <label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneEditName} onChange={e=>setSceneEditName(e.target.value)} /></label>
          <button className="btn btn-primary" style={{width:"100%"}} onClick={saveSceneEdit}>Kaydet</button>
        </Modal>
      }

      {sceneDeleteConfirm &&
        <Modal title="Ana Başlığı Sil" onClose={()=>setSceneDeleteConfirm(null)}>
          <div className="muted" style={{marginBottom:16}}>Bu ana başlık silinecek. Emin misin?</div>
          <div style={{display:"flex", gap:8}}>
            <button className="btn btn-dark" style={{flex:1}} onClick={()=>setSceneDeleteConfirm(null)}>Vazgeç</button>
            <button className="btn btn-danger" style={{flex:1}} onClick={deleteScene}>Sil</button>
          </div>
        </Modal>
      }
    </>}

    {view==="scene" && activeScene && <>
      <TopBar
        title={activeScene.name}
        sub="Başlık paneli"
        onBack={()=>setView("home")}
        right={<button className="btn btn-primary" onClick={()=>setModal("room")}>+ Alt Başlık</button>}
      />

      <div className="container">
        {activeScene.subs.map(r =>
          <div key={r.id} onClick={(e)=>e.stopPropagation()}>
            <RoomSwipeCard
              room={r}
              isRevealed={revealedRoomId===r.id}
              onReveal={(id)=>setRevealedRoomId(id)}
              onClose={()=>setRevealedRoomId(null)}
              onOpen={()=>goRoom(r.id)}
              onEdit={()=>editRoom(r)}
              onDelete={()=>setRoomDeleteConfirm(r.id)}
            />
          </div>
        )}
      </div>

      {modal==="room" &&
        <Modal title="Yeni Alt Başlık" onClose={()=>setModal(null)}>
          <label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label>
          <button className="btn btn-primary" style={{width:"100%"}} onClick={addRoom}>Ekle</button>
        </Modal>
      }

      {modal==="roomEdit" &&
        <Modal title="Alt Başlığı Düzenle" onClose={()=>setModal(null)}>
          <label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label>
          <button className="btn btn-primary" style={{width:"100%"}} onClick={saveRoomEdit}>Kaydet</button>
        </Modal>
      }

      {roomDeleteConfirm &&
        <Modal title="Alt Başlığı Sil" onClose={()=>setRoomDeleteConfirm(null)}>
          <div className="muted" style={{marginBottom:16}}>Bu alt başlık silinecek. Emin misin?</div>
          <div style={{display:"flex", gap:8}}>
            <button className="btn btn-dark" style={{flex:1}} onClick={()=>setRoomDeleteConfirm(null)}>Vazgeç</button>
            <button className="btn btn-danger" style={{flex:1}} onClick={deleteRoom}>Sil</button>
          </div>
        </Modal>
      }
    </>}

    {view==="room" && activeRoom && <>
      <TopBar
        title={activeRoom.name}
        sub="Basılı tutup yukarı aşağı taşı · açmak için dokun"
        onBack={()=>setView("scene")}
        right={<button className="btn btn-primary" onClick={()=>setModal("item")}>+ Eşya</button>}
      />

      <div className="container">
        <div className="item-list" ref={sceneRef} onMouseMove={moveDrag} onMouseUp={endDrag} onMouseLeave={endDrag} onTouchMove={onSceneTouchMove} onTouchEnd={onSceneTouchEnd}>
          {activeRoom.items.map((item, index)=>(
            <div key={item.id} data-item-sort-index={index}>
              <ItemSortableCard
                item={item}
                isDragging={draggingId===item.id}
                onPointerDown={(e)=>startDrag(item.id, index, e)}
                onTouchStart={(e)=>startDrag(item.id, index, e)}
                onOpen={()=>handleItemDoubleClick(item.id)}
              />
            </div>
          ))}
          {activeRoom.items.length===0 && <div className="section"><div className="muted">Bu alanda henüz eşya yok</div></div>}
        </div>
      </div>

      {modal==="item" &&
        <Modal title="Yeni Eşya" onClose={()=>setModal(null)}>
          <ItemForm form={itemForm} setForm={setItemForm} />
          <button className="btn btn-primary" style={{width:"100%"}} onClick={addItem}>Kaydet</button>
        </Modal>
      }
    </>}

    {view==="item" && activeItem && <>
      <TopBar
        title={activeItem.name}
        sub="Eşyanın detayları"
        onBack={()=>setView("room")}
        right={
          <div style={{display:"flex", gap:8}}>
            <button className="btn btn-danger" onClick={()=>setDeleteConfirm(activeItem.id)}>Sil</button>
            <button
              className="btn btn-primary"
              onClick={()=>{
                setEditForm({
                  ...activeItem,
                  selectedName:activeItem.name,
                  customName:activeItem.name,
                  invoiceFiles:[]
                });
                setModal("edit");
              }}
            >Düzenle modu</button>
          </div>
        }
      />

      <div className="container">
        <div className="card" style={{cursor:"default"}}>
          <div style={{display:"flex", justifyContent:"center", marginBottom:12}}>
            <ProductIcon item={activeItem} />
          </div>
          <div style={{fontWeight:700,marginTop:8}}>{activeItem.name}</div>
          {(activeItem.modelName || activeItem.model) && <div className="muted" style={{marginTop:4}}>Model adı: {activeItem.modelName || activeItem.model}</div>}
          {activeItem.modelNumber && <div className="muted" style={{marginTop:4}}>Model numarası: {activeItem.modelNumber}</div>}
          {activeItem.serialNo && <div className="muted" style={{marginTop:4}}>Seri no: {activeItem.serialNo}</div>}
          {activeItem.color && <div className="muted" style={{marginTop:4}}>Renk: {activeItem.color}</div>}
          <div className="muted" style={{marginTop:4}}>{activeItem.category}</div>
        </div>

        <div className="grid3">
          <div className="mini"><div className="muted">Marka</div><div>{activeItem.brand || "-"}</div></div>
          <div className="mini"><div className="muted">Model adı</div><div>{activeItem.modelName || "-"}</div></div>
          <div className="mini"><div className="muted">Model numarası</div><div>{activeItem.modelNumber || "-"}</div></div>
          <div className="mini"><div className="muted">Seri no</div><div>{activeItem.serialNo || "-"}</div></div>
          <div className="mini"><div className="muted">Edinme şekli</div><div>{activeItem.acquisitionType || "-"}</div></div>
          <div className="mini"><div className="muted">{activeItemMeta.dateLabel}</div><div>{activeItem.acquisitionDate || "-"}</div></div>
          <div className="mini"><div className="muted">{activeItemMeta.valueLabel}</div><div>{activeItem.purchasePrice ? "₺"+Number(activeItem.purchasePrice).toLocaleString("tr-TR") : "-"}</div></div>
          <div className="mini"><div className="muted">Garanti Süresi</div><div>{activeItem.guaranteeDuration || "-"}</div></div>
          <div className="mini"><div className="muted">Ek Garanti Yapıldımı</div><div>{activeItem.extraWarranty || "Hayır"}</div></div>
        </div>

        {(activeItem.acquisitionType === "Satın alındı" || activeItem.acquisitionType === "İkinci el alındı" || activeItem.acquisitionType === "Kiralandı") && (
          <div className="grid2" style={{marginTop:8}}>
            <div className="mini"><div className="muted">Gerçek Fiyat</div><div>{activeItem.realPrice ? "₺"+Number(activeItem.realPrice).toLocaleString("tr-TR") : "-"}</div></div>
            <div className="mini"><div className="muted">İndirim Tutarı</div><div>{activeItem.discountAmount ? "₺"+Number(activeItem.discountAmount).toLocaleString("tr-TR") : "-"}</div></div>
          </div>
        )}

        {(activeItem.acquisitionType === "Hediye geldi" || activeItem.acquisitionType === "Miras kaldı" || activeItem.acquisitionType === "İş yerinden verildi") && (
          <div className="grid2" style={{marginTop:8}}>
            <div className="mini"><div className="muted">{activeItemMeta.personLabel}</div><div>{activeItem.sourcePerson || "-"}</div></div>
            <div className="mini"><div className="muted">{activeItemMeta.reasonLabel}</div><div>{activeItem.sourceReason || "-"}</div></div>
          </div>
        )}

        {activeItem.extraWarranty === "Evet" &&
          <div className="section">
            <div style={{fontWeight:700,marginBottom:8}}>Ek Garanti Koşulları</div>
            <div className="muted">{activeItem.extraWarrantyTerms || "-"}</div>
          </div>
        }

        <div className="section">
          <div style={{fontWeight:700,marginBottom:8}}>Belgeler</div>
          {(activeItem.docs || []).length === 0 && <div className="muted">Belge yok</div>}
          {(activeItem.docs || []).map(d => (
            <span key={d.id} className="doc-pill" onClick={()=>setFilePreview(d)}>
              {d.type}: {d.name}
            </span>
          ))}
        </div>

        <ServiceForm serviceForm={serviceForm} setServiceForm={setServiceForm} onAdd={addServiceRecord} />

        <div className="section">
          <div style={{fontWeight:700,marginBottom:8}}>Servis Geçmişi</div>
          {(activeItem.services || []).length === 0 && <div className="muted">Servis kaydı yok</div>}
          {(activeItem.services || []).map(s => (
            <div key={s.id} className="service-card">
              <div><b>{s.date}</b> · {s.status}</div>
              {s.issue && <div className="muted" style={{marginTop:4}}>Arıza: {s.issue}</div>}
              {s.serviceName && <div className="muted" style={{marginTop:4}}>Servis: {s.serviceName}</div>}
              {s.serviceNote && <div className="muted" style={{marginTop:4}}>Not: {s.serviceNote}</div>}
              {s.changed && <div className="muted" style={{marginTop:4}}>Değişim: {s.changedProductName || "-"} / {s.changedModelName || "-"} / {s.changedSerialNo || "-"}</div>}
            </div>
          ))}
        </div>
      </div>

      {modal==="edit" &&
        <Modal title="Eşyayı Düzenle" onClose={()=>setModal(null)}>
          <ItemForm form={editForm} setForm={setEditForm} />
          <button className="btn btn-primary" style={{width:"100%"}} onClick={saveEdit}>Güncelle</button>
        </Modal>
      }

      {deleteConfirm &&
        <Modal title="Eşyayı Sil" onClose={()=>setDeleteConfirm(null)}>
          <div className="muted" style={{marginBottom:16}}>Bu eşyayı silmek istediğine emin misin?</div>
          <div style={{display:"flex", gap:8}}>
            <button className="btn btn-dark" onClick={()=>setDeleteConfirm(null)} style={{flex:1}}>Vazgeç</button>
            <button className="btn btn-danger" onClick={deleteActiveItem} style={{flex:1}}>Sil</button>
          </div>
        </Modal>
      }

      {filePreview &&
        <Modal title={filePreview.name} onClose={()=>setFilePreview(null)}>
          <iframe className="file-view" src={filePreview.url}></iframe>
        </Modal>
      }
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

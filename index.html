
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <title>Eşyamın Hayatı</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { overscroll-behavior: none; }
    body { margin:0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }

    .app {
      min-height:100vh;
      background:
        radial-gradient(circle at top right, var(--glow1) 0%, transparent 24%),
        radial-gradient(circle at bottom left, var(--glow2) 0%, transparent 20%),
        var(--bg);
      transition: background .25s ease, color .25s ease;
    }

    .topbar {
      position: sticky; top:0; z-index:50;
      display:flex; align-items:center; gap:10px;
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }

    .container { padding:18px; }
    .hero, .card, .mini, .section, .modal {
      background: var(--card);
      border:1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }

    .hero { border-radius:22px; padding:16px; cursor:pointer; margin-bottom:14px; }
    .card { border-radius:18px; padding:16px; margin-bottom:12px; }
    .section { border-radius:18px; padding:16px; margin-bottom:14px; }
    .mini { border-radius:14px; padding:12px 14px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .muted { color:var(--muted); font-size:12px; }

    .btn { border:none; border-radius:12px; padding:10px 14px; font-weight:700; cursor:pointer; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color:#fff; }
    .btn-dark { background: var(--card2); color: var(--text); border:1px solid var(--line); }

    .theme-row {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom:14px; padding:14px 16px; border-radius:18px; cursor:pointer;
      border:1px solid var(--line); background: color-mix(in srgb, var(--card) 88%, transparent);
      transition:transform .15s ease, border-color .2s ease;
    }
    .theme-row:active { transform:scale(.995); }
    .theme-row:hover { border-color: color-mix(in srgb, var(--accent) 42%, var(--line)); }
    .theme-row-title { font-size:20px; font-weight:800; display:flex; align-items:center; gap:8px; }
    .theme-row-hint { font-size:12px; color:var(--muted); }
    .theme-chevron {
      width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
      border:1px solid var(--line); background:var(--card2); font-size:18px; font-weight:800;
    }

    .theme-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .theme-section-title { font-size:14px; font-weight:700; margin:14px 0 8px; color:var(--muted); }
    .theme-card {
      display:flex; gap:10px; align-items:center; cursor:pointer; padding:10px;
      border-radius:16px; border:1px solid var(--line); background:var(--card2);
    }
    .theme-card.active { outline:2px solid var(--accent); }
    .theme-preview { width:54px; height:54px; border-radius:14px; border:1px solid rgba(255,255,255,.14); flex-shrink:0; }

    .color-lab {
      margin-top:12px; padding:12px; border-radius:16px; background:var(--card2); border:1px solid var(--line);
    }
    .pro-palette { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:10px; margin-top:14px; }
    .pro-swatch {
      position:relative; height:54px; border-radius:16px; cursor:pointer; overflow:hidden;
      border:1px solid rgba(255,255,255,.18); box-shadow:0 8px 18px rgba(0,0,0,.18);
      transition:transform .15s ease, border-color .2s ease;
    }
    .pro-swatch:hover, .pro-swatch.active { transform:translateY(-1px); border-color: color-mix(in srgb, var(--accent) 45%, #fff); }
    .pro-swatch.active::after {
      content:"✓"; position:absolute; right:8px; top:8px; width:18px; height:18px; border-radius:999px;
      display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800;
      color:#fff; background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.24);
    }
    .nature-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px; }
    .nature-chip {
      display:flex; gap:10px; align-items:center; min-height:58px; cursor:pointer;
      padding:10px; border-radius:14px; border:1px solid var(--line); background:var(--card);
    }
    .nature-chip.active { outline:2px solid var(--accent); }
    .nature-swatch { width:26px; height:26px; border-radius:999px; border:1px solid rgba(255,255,255,.18); flex-shrink:0; }
    .slider-grid { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; margin-top:10px; }
    .slider-grid input[type="range"] { width:100%; padding:0; background:transparent; border:none; }
    .slider-value-chip {
      min-width:56px; text-align:center; padding:8px 10px; border-radius:10px;
      border:1px solid var(--line); background:var(--card); font-size:12px; font-weight:700;
    }

    .swipe-wrap { position:relative; overflow:hidden; border-radius:22px; margin-bottom:14px; }
    .swipe-actions {
      position:absolute; inset:0 0 0 auto; width:176px; display:flex; gap:8px; justify-content:flex-end; padding-left:8px;
    }
    .swipe-btn { width:84px; border:none; border-radius:18px; color:#fff; font-weight:700; cursor:pointer; }
    .swipe-btn.edit { background: linear-gradient(135deg,#475569,#334155); }
    .swipe-btn.delete { background: linear-gradient(135deg,#ef4444,#dc2626); }
    .swipe-front { position:relative; z-index:2; transition:transform .22s ease; }
    .swipe-front.revealed { transform:translateX(-176px); }

    .sortable-node {
      position:relative; width:100%; touch-action:none; cursor:grab;
      user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
      transition:transform .08s ease, opacity .12s ease;
    }
    .sortable-node.press-ready { transform:scale(.992); }
    .sortable-node.dragging {
      z-index:20; cursor:grabbing; opacity:.92;
      transform:scale(1.02) rotate(-1deg);
      animation:itemWiggle .18s ease-in-out infinite alternate;
    }
    @keyframes itemWiggle {
      from { transform:scale(1.02) rotate(-1deg); }
      to { transform:scale(1.02) rotate(1deg); }
    }

    .hero-grid { display:grid; grid-template-columns:76px 1fr; gap:14px; align-items:center; }
    .hero-icon, .item-banner-icon {
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      background: linear-gradient(135deg, var(--accentSoft), var(--card2));
      border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    }
    .hero-icon { width:76px; height:76px; border-radius:24px; font-size:38px; }
    .summary-stack { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .summary-pill {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:8px 10px; border-radius:12px; font-size:12px;
      background: color-mix(in srgb, var(--card2) 86%, transparent); border:1px solid var(--line);
    }
    .summary-total { margin-top:8px; font-size:13px; font-weight:800; }

    .item-list { padding:14px; display:flex; flex-direction:column; gap:12px; }
    .item-banner {
      display:flex; align-items:center; gap:12px; width:100%; min-height:112px;
      padding:12px 14px; border-radius:20px;
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border:1px solid var(--line); box-shadow:0 12px 28px rgba(0,0,0,.18);
    }
    .item-banner-icon { width:84px; height:84px; border-radius:16px; flex-shrink:0; font-size:38px; }
    .item-banner-body { flex:1; min-width:0; text-align:left; }
    .item-banner-name { font-size:15px; font-weight:800; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-banner-line { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:3px; }
    .item-banner-meta-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .item-meta-chip {
      max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      border:1px solid var(--line); background:color-mix(in srgb, var(--card2) 88%, transparent);
      border-radius:999px; padding:6px 10px; font-size:11px;
    }
    .item-banner-value { margin-top:8px; font-size:13px; font-weight:800; }

    input, select, textarea {
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line);
      background:var(--card2); color:var(--text); outline:none; font-size:16px;
    }
    textarea { min-height:84px; resize:vertical; }
    label { display:block; margin-bottom:10px; }
    h1,h2,h3,p { margin:0; }

    .modal-backdrop {
      position:fixed; inset:0; z-index:999; padding:16px;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.72); backdrop-filter:blur(10px);
    }
    .modal {
      width:100%; max-width:760px; max-height:88vh; overflow:auto;
      border-radius:24px; padding:20px;
    }

    .doc-pill {
      display:inline-block; margin:4px 6px 0 0; cursor:pointer;
      padding:6px 10px; border-radius:999px; font-size:11px;
      background:var(--card2); border:1px solid var(--line);
    }
    .service-card {
      display:block; margin-top:8px; padding:12px; border-radius:14px;
      background:var(--card2); border:1px solid var(--line);
    }
    .file-view { width:100%; min-height:420px; border:1px solid var(--line); border-radius:16px; background:#fff; }

    @media (max-width: 760px) {
      .grid2, .grid3, .theme-grid, .nature-grid { grid-template-columns:1fr; }
      .pro-palette { grid-template-columns:repeat(4,minmax(0,1fr)); }
      .item-banner-icon { width:72px; height:72px; }
      .swipe-actions { width:160px; }
      .swipe-front.revealed { transform:translateX(-160px); }
      .swipe-btn { width:76px; }
    }
  </style>
</head>

function mkid(){ return Math.random().toString(36).slice(2,10); }
function tdy(){ return new Date().toLocaleDateString("tr-TR"); }

function hslTheme(h, sat=82, light=58){
  return {
    label:"Özel",
    bg:`hsl(${h} 28% 9%)`,
    text:`hsl(${h} 35% 96%)`,
    muted:`hsl(${h} 18% 72%)`,
    card:`hsl(${h} 24% 14%)`,
    card2:`hsl(${h} 24% 18%)`,
    line:`hsl(${h} 20% 28%)`,
    accent:`hsl(${h} ${sat}% ${light}%)`,
    accent2:`hsl(${(h+28)%360} ${Math.max(40,sat-8)}% ${Math.min(68,light+4)}%)`,
    accentSoft:`hsl(${h} 42% 20%)`,
    glow1:`hsla(${h} ${sat}% ${light}% / .14)`,
    glow2:`hsla(${(h+28)%360} ${Math.max(40,sat-8)}% ${Math.min(68,light+4)}% / .08)`
  };
}
function applyTheme(theme){ Object.entries(theme).forEach(([k,v])=>{ if(k!=="label") document.documentElement.style.setProperty(`--${k}`, v); }); }
function formatCurrency(value){ const n=Number(value||0); return n ? "₺"+n.toLocaleString("tr-TR") : "-"; }
function parseGuaranteeMonths(text=""){ const raw=String(text||"").toLowerCase().trim(); const n=parseInt(raw.match(/\d+/)?.[0]||"0",10); if(!n) return 0; return raw.includes("yıl") || raw.includes("sene") ? n*12 : n; }
function getGuaranteeRemainingLabel(item){
  const months=parseGuaranteeMonths(item?.guaranteeDuration||"");
  if(!months || !item?.acquisitionDate) return "Garanti: Belirsiz";
  const start=new Date(item.acquisitionDate); if(Number.isNaN(start.getTime())) return "Garanti: Belirsiz";
  const end=new Date(start); end.setMonth(end.getMonth()+months);
  const diff=end.getTime()-Date.now(); if(diff<=0) return "Garanti: Bitti";
  const days=Math.ceil(diff/(1000*60*60*24)); if(days<30) return `Garanti: ${days} gün kaldı`;
  return `Garanti: ${Math.ceil(days/30)} ay kaldı`;
}
function buildCategorySummary(items=[]){
  const map={};
  items.forEach(item => {
    const key=item.category || item.type || "Diğer";
    if(!map[key]) map[key]={count:0,value:0};
    map[key].count += 1;
    map[key].value += Number(item.purchasePrice||0);
  });
  return Object.entries(map).sort((a,b)=>b[1].value-a[1].value || b[1].count-a[1].count).map(([name,meta])=>({name,...meta}));
}

function SwipeSortableCard({ children, revealed, onReveal, onClose, onEdit, onDelete, onOpen, onStartDrag, onMoveDrag, onEndDrag, isDragging, isPressReady, dataIndex, dataKind }) {
  const touchRef = useRef({ startX:0, startY:0, swiping:false, moved:false });

  function handleTouchStart(e){
    const t=e.touches[0];
    touchRef.current = { startX:t.clientX, startY:t.clientY, swiping:false, moved:false };
    onStartDrag(e);
  }
  function handleTouchMove(e){
    if(isDragging){
      onMoveDrag(e);
      return;
    }
    const t=e.touches[0];
    const dx=t.clientX-touchRef.current.startX;
    const dy=t.clientY-touchRef.current.startY;
    if (Math.abs(dx) > SWIPE_LOCK && Math.abs(dx) > Math.abs(dy)) {
      touchRef.current.swiping = true;
      touchRef.current.moved = true;
      onEndDrag(false);
    } else if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
      touchRef.current.moved = true;
      onEndDrag(false);
    }
  }
  function handleTouchEnd(e){
    if (isDragging) { onEndDrag(true); return; }
    const t=e.changedTouches[0];
    const dx=t.clientX-touchRef.current.startX;
    const dy=Math.abs(t.clientY-touchRef.current.startY);
    onEndDrag(false);
    if (touchRef.current.swiping && dy < 50) {
      if (dx < -SWIPE_TRIGGER) onReveal();
      if (dx > SWIPE_CLOSE) onClose();
      return;
    }
    if (!touchRef.current.moved) onOpen();
  }

  function handleMouseDown(e){ onStartDrag(e); }
  function handleMouseUp(){ onEndDrag(true); }

  return <div className={`sortable-node ${isDragging ? "dragging" : ""} ${isPressReady ? "press-ready" : ""}`} data-sort-index={dataIndex} data-sort-kind={dataKind}
      onMouseDown={handleMouseDown} onMouseUp={handleMouseUp} onMouseLeave={()=>onEndDrag(false)}
      onMouseMove={onMoveDrag}
      onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} onTouchCancel={()=>onEndDrag(false)}
      onDragStart={e=>e.preventDefault()}>
    <div className="swipe-wrap">
      <div className="swipe-actions">
        <button className="swipe-btn edit" onClick={e=>{e.stopPropagation(); onEdit();}}>Düzenle</button>
        <button className="swipe-btn delete" onClick={e=>{e.stopPropagation(); onDelete();}}>Sil</button>
      </div>
      <div className={`swipe-front ${revealed ? "revealed" : ""}`}>
        {children}
      </div>
    </div>
  </div>;
}

      const giftMode = ["Hediye geldi","Miras kaldı","İş yerinden verildi"].includes(next.acquisitionType);

      if (key === "acquisitionType") {

        }

      if (priceMode) {
        const real = parseFloat(String(next.realPrice || "").replace(",", ".")) || 0;

        const total = Math.max(real - discount, 0);
        next.purchasePrice = total ? String(total) : "";

      if (!giftMode && !priceMode && key !== "purchasePrice") {

function App(){

  const [editForm, setEditForm] = useState(emptyItemForm());
  const [serviceForm, setServiceForm] = useState(emptyServiceForm());

  const [pressReadyKey, setPressReadyKey] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [sceneDeleteConfirm, setSceneDeleteConfirm] = useState(null);
  const [roomDeleteConfirm, setRoomDeleteConfirm] = useState(null);
  const [filePreview, setFilePreview] = useState(null);

  const [revealedSceneId, setRevealedSceneId] = useState(null);
  const [revealedRoomId, setRevealedRoomId] = useState(null);
  const [revealedItemId, setRevealedItemId] = useState(null);

  const dragRef = useRef({ timer:null, index:null, kind:null, key:null });
  const colorBarRef = useRef(null);

  useEffect(() => {
    let applied = false;
    for (const group of Object.values(THEME_GROUPS)) {
      if (group[themeKey]) {
        applyTheme(group[themeKey]);
        applied = true;
      }
    }
    if (!applied && themeKey === "custom") applyTheme(hslTheme(customTheme.hue, customTheme.sat, customTheme.light));
  }, [themeKey, customTheme]);

  const activeScene = useMemo(() => scenes.find(s => s.id === activeSceneId) || null, [scenes, activeSceneId]);
  const activeRoom = useMemo(() => activeScene ? activeScene.subs.find(r => r.id === activeRoomId) || null : null, [activeScene, activeRoomId]);
  const activeItem = useMemo(() => activeRoom ? activeRoom.items.find(i => i.id === activeItemId) || null : null, [activeRoom, activeItemId]);
  const allItems = useMemo(() => scenes.flatMap(s => s.subs.flatMap(r => r.items)), [scenes]);

  function goScene(id){ setActiveSceneId(id); setView("scene"); setRevealedSceneId(null); }
  function goRoom(id){ setActiveRoomId(id); setView("room"); setRevealedRoomId(null); }
  function goItem(id){ setActiveItemId(id); setView("item"); setRevealedItemId(null); }

  function chooseNature(p){ setSelectedNature(p.name); setCustomTheme({ hue:p.hue, sat:p.sat, light:p.light }); setThemeKey("custom"); }
  function chooseProColor(p){ setSelectedNature(null); setCustomTheme({ hue:p.hue, sat:p.sat, light:p.light }); setThemeKey("custom"); }
  function updateHueFromClientX(clientX){
    const rect = colorBarRef.current.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    setSelectedNature(null);
    setCustomTheme(prev => ({ ...prev, hue: Math.round(ratio * 360) }));
    setThemeKey("custom");
  }

  function addScene(){
    if(!sceneName.trim()) return;
    setScenes(prev => [...prev, { id:mkid(), name:sceneName.trim(), subs:[] }]);
    setSceneName(""); setModal(null);
  }
  function saveSceneEdit(){
    if(!sceneEditName.trim() || !activeSceneId) return;
    setScenes(prev => prev.map(s => s.id===activeSceneId ? { ...s, name:sceneEditName.trim() } : s));
    setModal(null);
  }
  function deleteScene(){
    if(!sceneDeleteConfirm) return;
    setScenes(prev => prev.filter(s => s.id !== sceneDeleteConfirm));
    setSceneDeleteConfirm(null); setView("home"); setActiveSceneId(""); setRevealedSceneId(null);
  }

  function addRoom(){
    if(!roomName.trim() || !activeSceneId) return;
    setScenes(prev => prev.map(s => s.id===activeSceneId ? { ...s, subs:[...s.subs, { id:mkid(), name:roomName.trim(), items:[] }] } : s));
    setRoomName(""); setModal(null);
  }
  function saveRoomEdit(){
    if(!roomName.trim() || !activeSceneId || !activeRoomId) return;
    setScenes(prev => prev.map(s => s.id===activeSceneId ? { ...s, subs:s.subs.map(r => r.id===activeRoomId ? { ...r, name:roomName.trim() } : r) } : s));
    setRoomName(""); setModal(null); setRevealedRoomId(null);
  }
  function deleteRoom(){
    if(!roomDeleteConfirm || !activeSceneId) return;
    setScenes(prev => prev.map(s => s.id===activeSceneId ? { ...s, subs:s.subs.filter(r => r.id!==roomDeleteConfirm) } : s));
    setRoomDeleteConfirm(null); setRevealedRoomId(null);
  }

  function addItem(){
    if(!itemForm.name.trim() || !activeSceneId || !activeRoomId) return;
    const next = { id:mkid(), ...itemForm, docs:[...(itemForm.invoiceFiles||[])], services:[] };
    setScenes(prev => prev.map(s => s.id===activeSceneId ? {
      ...s,
      subs:s.subs.map(r => r.id===activeRoomId ? { ...r, items:[...r.items, next] } : r)
    } : s));
    setItemForm(emptyItemForm()); setModal(null);
  }
  function updateItem(itemId, updater){
    setScenes(prev => prev.map(s => s.id===activeSceneId ? {
      ...s,
      subs:s.subs.map(r => r.id===activeRoomId ? { ...r, items:r.items.map(i => i.id===itemId ? updater(i) : i) } : r)
    } : s));
  }
  function deleteActiveItem(){
    if(!activeItem) return;
    setScenes(prev => prev.map(s => s.id===activeSceneId ? {
      ...s,
      subs:s.subs.map(r => r.id===activeRoomId ? { ...r, items:r.items.filter(i => i.id!==activeItem.id) } : r)
    } : s));
    setDeleteConfirm(null); setView("room");
  }
  function deleteItemById(itemId){
    setScenes(prev => prev.map(s => s.id===activeSceneId ? {
      ...s,
      subs:s.subs.map(r => r.id===activeRoomId ? { ...r, items:r.items.filter(i => i.id!==itemId) } : r)
    } : s));
    if (activeItemId === itemId) setView("room");
    setRevealedItemId(null);
  }
  function saveEdit(){
    if(!activeItem || !editForm.name.trim()) return;
    const mergedDocs = [...(activeItem.docs || []), ...(editForm.invoiceFiles || [])];
    updateItem(activeItem.id, i => ({ ...i, ...editForm, docs:mergedDocs }));
    setModal(null);
  }
  function addServiceRecord(){
    if(!activeItem || !serviceForm.date || !serviceForm.status) return;
    updateItem(activeItem.id, i => {
      const nextServices = [...(i.services || []), { id:mkid(), ...serviceForm }];
      let updated = { ...i, services:nextServices };
      if (serviceForm.changed) {
        updated = {
          ...updated,
          name: serviceForm.changedProductName || updated.name,
          modelName: serviceForm.changedModelName || updated.modelName,
          serialNo: serviceForm.changedSerialNo || updated.serialNo
        };
      }
      return updated;
    });
    setServiceForm(emptyServiceForm());
  }

  function reorderScenes(from, to){
    if (from === to || from == null || to == null) return;
    setScenes(prev => { const arr=[...prev]; const [moved]=arr.splice(from,1); arr.splice(to,0,moved); return arr; });
  }
  function reorderRooms(from, to){
    if (from === to || from == null || to == null || !activeSceneId) return;
    setScenes(prev => prev.map(s => {
      if (s.id !== activeSceneId) return s;
      const arr=[...s.subs]; const [moved]=arr.splice(from,1); arr.splice(to,0,moved); return { ...s, subs:arr };
    }));
  }
  function reorderItems(from, to){
    if (from === to || from == null || to == null || !activeSceneId || !activeRoomId) return;
    setScenes(prev => prev.map(s => {
      if (s.id !== activeSceneId) return s;
      return {
        ...s,
        subs:s.subs.map(r => {
          if (r.id !== activeRoomId) return r;
          const arr=[...r.items]; const [moved]=arr.splice(from,1); arr.splice(to,0,moved); return { ...r, items:arr };
        })
      };
    }));
  }

  function startDrag(kind, key, index, e){
    clearTimeout(dragRef.current.timer);
    dragRef.current = { timer:null, index, kind, key };
    setPressReadyKey(key);
    if (e.touches) {
      dragRef.current.timer = setTimeout(() => {
        dragRef.current.timer = null;
        setDraggingKey(key);
        setPressReadyKey(null);
      }, LONG_PRESS_MS);
      return;
    }
    e.preventDefault();
    setDraggingKey(key);
    setPressReadyKey(null);
  }

  function moveDrag(e){
    if (!draggingKey) return;
    const point = e.touches ? e.touches[0] : e;
    e.preventDefault && e.preventDefault();
    const kind = dragRef.current.kind;
    const els = Array.from(document.querySelectorAll(`[data-sort-kind="${kind}"]`));
    if (!els.length) return;
    let targetIndex = dragRef.current.index;
    els.forEach((el, idx) => {
      const rect = el.getBoundingClientRect();
      if (point.clientY > rect.top && point.clientY < rect.bottom) targetIndex = idx;
    });
    if (targetIndex !== dragRef.current.index) {
      if (kind === "scene") reorderScenes(dragRef.current.index, targetIndex);
      if (kind === "room") reorderRooms(dragRef.current.index, targetIndex);
      if (kind === "item") reorderItems(dragRef.current.index, targetIndex);
      dragRef.current.index = targetIndex;
    }
  }

  function endDrag(finalize=true){
    clearTimeout(dragRef.current.timer);
    dragRef.current.timer = null;
    if (finalize || !draggingKey) {
      setDraggingKey(null);
      setPressReadyKey(null);
    } else {
      setPressReadyKey(null);
    }
  }

  const activeItemMeta = activeItem ? (ACQUISITION_OPTIONS[activeItem.acquisitionType] || ACQUISITION_OPTIONS["Satın alındı"]) : null;

  return <div className="app" onClick={() => { if(revealedSceneId) setRevealedSceneId(null); if(revealedRoomId) setRevealedRoomId(null); if(revealedItemId) setRevealedItemId(null); }}>
    {view==="home" && <>
      <TopBar
        title="Eşyamın Hayatı"
        right={<button className="btn btn-primary" onClick={e => { e.stopPropagation(); setModal("scene"); }}>+ Başlık</button>}
      />

      <div className="container">
        <div className="theme-row" onClick={() => setThemeLibraryOpen(v => !v)}>
          <div>
            <div className="theme-row-title">Tema</div>
            <div className="theme-row-hint">Dokunarak temaları aç</div>
          </div>
          <div className="theme-chevron">{themeLibraryOpen ? "–" : "›"}</div>
        </div>

        {themeLibraryOpen && <div className="hero" style={{cursor:"default"}}>
          {Object.entries(THEME_GROUPS).map(([groupName, group]) => <div key={groupName}>
            <div className="theme-section-title">{groupName}</div>
            <div className="theme-grid">
              {Object.entries(group).map(([key, theme]) => <div key={key} className={`theme-card ${themeKey===key ? "active" : ""}`} onClick={() => setThemeKey(key)}>
                <div className="theme-preview" style={{background:`linear-gradient(135deg, ${theme.accent}, ${theme.accent2})`}} />
                <div><div style={{fontWeight:700}}>{theme.label}</div><div className="muted">{groupName}</div></div>
              </div>)}
            </div>
          </div>)}

          <div className="color-lab">
            <div style={{fontWeight:700}}>Profesyonel Renk Kartelası</div>
            <div className="muted" style={{marginTop:4}}>Hazır premium tonlar + sonsuz renk üretme alanı.</div>

            <div className="pro-palette">
              {PRO_COLOR_SWATCHES.map(p => {
                const active = themeKey==="custom" && customTheme.hue===p.hue && customTheme.sat===p.sat && customTheme.light===p.light;
                return <div key={p.name} className={`pro-swatch ${active ? "active" : ""}`} title={p.name}
                  style={{background:`linear-gradient(135deg, hsl(${p.hue} ${p.sat}% ${Math.max(18,p.light-14)}%), hsl(${p.hue} ${p.sat}% ${p.light}%))`}}
                  onClick={() => chooseProColor(p)} />;
              })}
            </div>

            <div className="theme-section-title" style={{marginTop:16}}>Sonsuz Renk Üret</div>
            <div
              ref={colorBarRef}
              style={{
                width:"100%", height:"42px", borderRadius:"999px", position:"relative", cursor:"crosshair",
                border:"1px solid rgba(255,255,255,.18)",
                background:"linear-gradient(90deg,hsl(0 95% 58%),hsl(15 95% 58%),hsl(30 95% 58%),hsl(45 95% 58%),hsl(60 95% 58%),hsl(90 90% 50%),hsl(120 78% 46%),hsl(150 75% 44%),hsl(180 82% 44%),hsl(210 85% 56%),hsl(240 85% 62%),hsl(270 82% 62%),hsl(300 80% 60%),hsl(330 82% 60%),hsl(360 95% 58%))"
              }}
              onPointerDown={e => updateHueFromClientX(e.clientX)}
              onPointerMove={e => { if(e.buttons===1) updateHueFromClientX(e.clientX); }}
              onTouchStart={e => { if(e.touches[0]) updateHueFromClientX(e.touches[0].clientX); }}
              onTouchMove={e => { if(e.touches[0]) updateHueFromClientX(e.touches[0].clientX); }}
            >
              <div style={{
                position:"absolute", top:"50%", left:`${(customTheme.hue/360)*100}%`, transform:"translate(-50%,-50%)",
                width:"22px", height:"22px", borderRadius:"999px", border:"3px solid #fff",
                boxShadow:"0 0 0 2px rgba(0,0,0,.25)", background:`hsl(${customTheme.hue} ${customTheme.sat}% ${customTheme.light}%)`
              }} />
            </div>

            <div className="slider-grid">
              <input type="range" min="20" max="100" value={customTheme.sat} onChange={e => { setSelectedNature(null); setThemeKey("custom"); setCustomTheme(prev => ({...prev, sat:Number(e.target.value)})); }} />
              <div className="slider-value-chip">Doygunluk {customTheme.sat}</div>
            </div>
            <div className="slider-grid">
              <input type="range" min="32" max="72" value={customTheme.light} onChange={e => { setSelectedNature(null); setThemeKey("custom"); setCustomTheme(prev => ({...prev, light:Number(e.target.value)})); }} />
              <div className="slider-value-chip">Parlaklık {customTheme.light}</div>
            </div>

            <div className="theme-section-title">Doğadaki Renkler ve Alt Tonları</div>
            <div className="nature-grid">
              {NATURE_PALETTE.map(p => <div key={p.name} className={`nature-chip ${selectedNature===p.name ? "active" : ""}`} onClick={() => chooseNature(p)}>
                <div className="nature-swatch" style={{background:`hsl(${p.hue} ${p.sat}% ${p.light}%)`}} />
                <div><div style={{fontWeight:700}}>{p.name}</div><div className="muted">{p.hue}° ton</div></div>
              </div>)}
            </div>
          </div>
        </div>}

        {scenes.map((s, index) => <div key={s.id} onClick={e => e.stopPropagation()}>
          <SwipeSortableCard
            dataIndex={index}
            dataKind="scene"
            revealed={revealedSceneId===s.id}
            onReveal={() => { setRevealedSceneId(s.id); setRevealedRoomId(null); setRevealedItemId(null); }}
            onClose={() => setRevealedSceneId(null)}
            onEdit={() => { setActiveSceneId(s.id); setSceneEditName(s.name); setModal("sceneEdit"); }}
            onDelete={() => setSceneDeleteConfirm(s.id)}
            onOpen={() => goScene(s.id)}
            onStartDrag={e => startDrag("scene", `scene-${s.id}`, index, e)}
            onMoveDrag={moveDrag}
            onEndDrag={endDrag}
            isDragging={draggingKey===`scene-${s.id}`}
            isPressReady={pressReadyKey===`scene-${s.id}`}
          >
            <SceneCard scene={s} onOpen={() => goScene(s.id)} />
          </SwipeSortableCard>
        </div>)}
      </div>

      {modal==="scene" && <Modal title="Yeni Başlık" onClose={() => setModal(null)}>
        <label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneName} onChange={e=>setSceneName(e.target.value)} /></label>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={addScene}>Oluştur</button>
      </Modal>}

      {modal==="sceneEdit" && <Modal title="Ana Başlığı Düzenle" onClose={() => setModal(null)}>
        <label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneEditName} onChange={e=>setSceneEditName(e.target.value)} /></label>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={saveSceneEdit}>Kaydet</button>
      </Modal>}

      {sceneDeleteConfirm && <Modal title="Ana Başlığı Sil" onClose={() => setSceneDeleteConfirm(null)}>
        <div className="muted" style={{marginBottom:16}}>Bu ana başlık silinecek. Emin misin?</div>
        <div style={{display:"flex", gap:8}}>
          <button className="btn btn-dark" style={{flex:1}} onClick={() => setSceneDeleteConfirm(null)}>Vazgeç</button>
          <button className="btn btn-danger" style={{flex:1}} onClick={deleteScene}>Sil</button>
        </div>
      </Modal>}
    </>}

    {view==="scene" && activeScene && <>
      <TopBar
        title={activeScene.name}
        sub="Basılı tutup yukarı aşağı taşı · sola kaydırınca düzenle / sil"
        onBack={() => setView("home")}
        right={<button className="btn btn-primary" onClick={() => setModal("room")}>+ Alt Başlık</button>}
      />
      <div className="container">
        {activeScene.subs.map((r, index) => <div key={r.id} onClick={e => e.stopPropagation()}>
          <SwipeSortableCard
            dataIndex={index}
            dataKind="room"
            revealed={revealedRoomId===r.id}
            onReveal={() => { setRevealedRoomId(r.id); setRevealedItemId(null); }}
            onClose={() => setRevealedRoomId(null)}
            onEdit={() => { setActiveRoomId(r.id); setRoomName(r.name); setModal("roomEdit"); }}
            onDelete={() => setRoomDeleteConfirm(r.id)}
            onOpen={() => goRoom(r.id)}
            onStartDrag={e => startDrag("room", `room-${r.id}`, index, e)}
            onMoveDrag={moveDrag}
            onEndDrag={endDrag}
            isDragging={draggingKey===`room-${r.id}`}
            isPressReady={pressReadyKey===`room-${r.id}`}
          >
            <RoomCard room={r} onOpen={() => goRoom(r.id)} />
          </SwipeSortableCard>
        </div>)}
      </div>

      {modal==="room" && <Modal title="Yeni Alt Başlık" onClose={() => setModal(null)}>
        <label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={addRoom}>Ekle</button>
      </Modal>}

      {modal==="roomEdit" && <Modal title="Alt Başlığı Düzenle" onClose={() => setModal(null)}>
        <label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={saveRoomEdit}>Kaydet</button>
      </Modal>}

      {roomDeleteConfirm && <Modal title="Alt Başlığı Sil" onClose={() => setRoomDeleteConfirm(null)}>
        <div className="muted" style={{marginBottom:16}}>Bu alt başlık silinecek. Emin misin?</div>
        <div style={{display:"flex", gap:8}}>
          <button className="btn btn-dark" style={{flex:1}} onClick={() => setRoomDeleteConfirm(null)}>Vazgeç</button>
          <button className="btn btn-danger" style={{flex:1}} onClick={deleteRoom}>Sil</button>
        </div>
      </Modal>}
    </>}

    {view==="room" && activeRoom && <>
      <TopBar
        title={activeRoom.name}
        sub="Basılı tutup yukarı aşağı taşı · sola kaydırınca düzenle / sil · açmak için dokun"
        onBack={() => setView("scene")}
        right={<button className="btn btn-primary" onClick={() => setModal("item")}>+ Eşya</button>}
      />
      <div className="container">
        <div className="item-list">
          {activeRoom.items.map((item, index) => <div key={item.id} onClick={e => e.stopPropagation()}>
            <SwipeSortableCard
              dataIndex={index}
              dataKind="item"
              revealed={revealedItemId===item.id}
              onReveal={() => setRevealedItemId(item.id)}
              onClose={() => setRevealedItemId(null)}
              onEdit={() => {
                setActiveItemId(item.id);
                setEditForm({ ...item, selectedName:item.name, customName:item.name, invoiceFiles:[] });
                setModal("editInline");
              }}
              onDelete={() => deleteItemById(item.id)}
              onOpen={() => goItem(item.id)}
              onStartDrag={e => startDrag("item", `item-${item.id}`, index, e)}
              onMoveDrag={moveDrag}
              onEndDrag={endDrag}
              isDragging={draggingKey===`item-${item.id}`}
              isPressReady={pressReadyKey===`item-${item.id}`}
            >
              <ItemCard item={item} onOpen={() => goItem(item.id)} />
            </SwipeSortableCard>
          </div>)}
          {activeRoom.items.length===0 && <div className="section"><div className="muted">Bu alanda henüz eşya yok</div></div>}
        </div>
      </div>

      {modal==="item" && <Modal title="Yeni Eşya" onClose={() => setModal(null)}>
        <ItemForm form={itemForm} setForm={setItemForm} />
        <button className="btn btn-primary" style={{width:"100%"}} onClick={addItem}>Kaydet</button>
      </Modal>}

      {modal==="editInline" && <Modal title="Eşyayı Düzenle" onClose={() => setModal(null)}>
        <ItemForm form={editForm} setForm={setEditForm} />
        <button className="btn btn-primary" style={{width:"100%"}} onClick={() => {
          const target = activeRoom.items.find(i => i.id===activeItemId);
          if (!target || !editForm.name.trim()) return;
          const mergedDocs = [...(target.docs || []), ...(editForm.invoiceFiles || [])];
          updateItem(target.id, i => ({ ...i, ...editForm, docs:mergedDocs }));
          setModal(null);
        }}>Güncelle</button>
      </Modal>}
    </>}

    {view==="item" && activeItem && <>
      <TopBar
        title={activeItem.name}
        sub="Eşyanın detayları"
        onBack={() => setView("room")}
        right={<div style={{display:"flex", gap:8}}>
          <button className="btn btn-danger" onClick={() => setDeleteConfirm(activeItem.id)}>Sil</button>
          <button className="btn btn-primary" onClick={() => {
            setEditForm({ ...activeItem, selectedName:activeItem.name, customName:activeItem.name, invoiceFiles:[] });
            setModal("edit");
          }}>Düzenle modu</button>
        </div>}
      />

      <div className="container">
        <div className="card" style={{cursor:"default"}}>
          <div style={{display:"flex", justifyContent:"center", marginBottom:12, fontSize:64}}>{detectItemEmoji(activeItem)}</div>
          <div style={{fontWeight:700,marginTop:8}}>{activeItem.name}</div>
          {(activeItem.modelName || activeItem.model) && <div className="muted" style={{marginTop:4}}>Model adı: {activeItem.modelName || activeItem.model}</div>}
          {activeItem.modelNumber && <div className="muted" style={{marginTop:4}}>Model numarası: {activeItem.modelNumber}</div>}
          {activeItem.serialNo && <div className="muted" style={{marginTop:4}}>Seri no: {activeItem.serialNo}</div>}
          {activeItem.color && <div className="muted" style={{marginTop:4}}>Renk: {activeItem.color}</div>}
          <div className="muted" style={{marginTop:4}}>{activeItem.category}</div>
        </div>

        <div className="grid3">
          <div className="mini"><div className="muted">Marka</div><div>{activeItem.brand || "-"}</div></div>
          <div className="mini"><div className="muted">Model adı</div><div>{activeItem.modelName || "-"}</div></div>
          <div className="mini"><div className="muted">Model numarası</div><div>{activeItem.modelNumber || "-"}</div></div>
          <div className="mini"><div className="muted">Seri no</div><div>{activeItem.serialNo || "-"}</div></div>
          <div className="mini"><div className="muted">Edinme şekli</div><div>{activeItem.acquisitionType || "-"}</div></div>
          <div className="mini"><div className="muted">{activeItemMeta.dateLabel}</div><div>{activeItem.acquisitionDate || "-"}</div></div>
          <div className="mini"><div className="muted">{activeItemMeta.valueLabel}</div><div>{activeItem.purchasePrice ? "₺"+Number(activeItem.purchasePrice).toLocaleString("tr-TR") : "-"}</div></div>
          <div className="mini"><div className="muted">Garanti Süresi</div><div>{activeItem.guaranteeDuration || "-"}</div></div>
          <div className="mini"><div className="muted">Ek Garanti Yapıldımı</div><div>{activeItem.extraWarranty || "Hayır"}</div></div>
        </div>

        {["Satın alındı","İkinci el alındı","Kiralandı"].includes(activeItem.acquisitionType) && <div className="grid2" style={{marginTop:8}}>
          <div className="mini"><div className="muted">Gerçek Fiyat</div><div>{activeItem.realPrice ? "₺"+Number(activeItem.realPrice).toLocaleString("tr-TR") : "-"}</div></div>
          <div className="mini"><div className="muted">İndirim Tutarı</div><div>{activeItem.discountAmount ? "₺"+Number(activeItem.discountAmount).toLocaleString("tr-TR") : "-"}</div></div>
        </div>}

        {["Hediye geldi","Miras kaldı","İş yerinden verildi"].includes(activeItem.acquisitionType) && <div className="grid2" style={{marginTop:8}}>
          <div className="mini"><div className="muted">{activeItemMeta.personLabel}</div><div>{activeItem.sourcePerson || "-"}</div></div>
          <div className="mini"><div className="muted">{activeItemMeta.reasonLabel}</div><div>{activeItem.sourceReason || "-"}</div></div>
        </div>}

        {activeItem.extraWarranty === "Evet" && <div className="section">
          <div style={{fontWeight:700,marginBottom:8}}>Ek Garanti Koşulları</div>
          <div className="muted">{activeItem.extraWarrantyTerms || "-"}</div>
        </div>}

        <div className="section">
          <div style={{fontWeight:700,marginBottom:8}}>Belgeler</div>
          {(activeItem.docs || []).length===0 && <div className="muted">Belge yok</div>}
          {(activeItem.docs || []).map(d => <span key={d.id} className="doc-pill" onClick={() => setFilePreview(d)}>{d.type}: {d.name}</span>)}
        </div>

        <ServiceForm serviceForm={serviceForm} setServiceForm={setServiceForm} onAdd={addServiceRecord} />

        <div className="section">
          <div style={{fontWeight:700,marginBottom:8}}>Servis Geçmişi</div>
          {(activeItem.services || []).length===0 && <div className="muted">Servis kaydı yok</div>}
          {(activeItem.services || []).map(s => <div key={s.id} className="service-card">
            <div><b>{s.date}</b> · {s.status}</div>
            {s.issue && <div className="muted" style={{marginTop:4}}>Arıza: {s.issue}</div>}
            {s.serviceName && <div className="muted" style={{marginTop:4}}>Servis: {s.serviceName}</div>}
            {s.serviceNote && <div className="muted" style={{marginTop:4}}>Not: {s.serviceNote}</div>}
            {s.changed && <div className="muted" style={{marginTop:4}}>Değişim: {s.changedProductName || "-"} / {s.changedModelName || "-"} / {s.changedSerialNo || "-"}</div>}
          </div>)}
        </div>
      </div>

      {modal==="edit" && <Modal title="Eşyayı Düzenle" onClose={() => setModal(null)}>
        <ItemForm form={editForm} setForm={setEditForm} />
        <button className="btn btn-primary" style={{width:"100%"}} onClick={saveEdit}>Güncelle</button>
      </Modal>}

      {deleteConfirm && <Modal title="Eşyayı Sil" onClose={() => setDeleteConfirm(null)}>
        <div className="muted" style={{marginBottom:16}}>Bu eşyayı silmek istediğine emin misin?</div>
        <div style={{display:"flex", gap:8}}>
          <button className="btn btn-dark" onClick={() => setDeleteConfirm(null)} style={{flex:1}}>Vazgeç</button>
          <button className="btn btn-danger" onClick={deleteActiveItem} style={{flex:1}}>Sil</button>
        </div>
      </Modal>}

      {filePreview && <Modal title={filePreview.name} onClose={() => setFilePreview(null)}>
        <iframe className="file-view" src={filePreview.url}></iframe>
      </Modal>}
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

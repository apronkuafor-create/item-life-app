  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { overscroll-behavior: none; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .app {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, var(--glow1) 0%, transparent 24%),
        radial-gradient(circle at bottom left, var(--glow2) 0%, transparent 20%),
        var(--bg);
      transition: background .25s ease, color .25s ease;
    }
    .topbar {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display:flex; align-items:center; gap:10px;
      position:sticky; top:0; z-index:40;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }
    .container { padding: 18px; }
    .hero, .card, .mini, .modal, .section {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }
    .hero { border-radius: 22px; padding: 16px; margin-bottom: 14px; cursor: pointer; }
    .hero-grid { display:grid; grid-template-columns: 76px 1fr; gap:14px; align-items:center; }
    .hero-icon {
      width:76px; height:76px; border-radius:24px;
      display:flex; align-items:center; justify-content:center;
      font-size:38px; background: linear-gradient(135deg, var(--accentSoft), var(--card2));
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    }
    .section-strip {
      padding: 2px 2px 14px 2px;
    }
    .section-strip-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .2px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .section-strip-sub {
      color: var(--muted);
      font-size: 13px;
    }
    .theme-library-head {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      cursor:pointer;
    }
    .theme-section-title { font-size: 14px; font-weight: 700; margin: 14px 0 8px; color: var(--muted); }
    .theme-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .theme-card {
      border:1px solid var(--line); border-radius:16px; padding:10px; background: var(--card2); cursor:pointer;
      display:flex; gap:10px; align-items:center;
    }
    .theme-card.active { outline: 2px solid var(--accent); }
    .theme-preview {
      width:54px; height:54px; border-radius:14px; flex-shrink:0; border:1px solid rgba(255,255,255,.14);
    }
    .color-lab {
      background: var(--card2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-top:12px;
    }
    .color-spectrum {
      width:100%;
      height:42px;
      border-radius:999px;
      position:relative;
      cursor:crosshair;
      border:1px solid rgba(255,255,255,.18);
      background:
        linear-gradient(90deg,
          hsl(0 95% 58%),
          hsl(15 95% 58%),
          hsl(30 95% 58%),
          hsl(45 95% 58%),
          hsl(60 95% 58%),
          hsl(90 90% 50%),
          hsl(120 78% 46%),
          hsl(150 75% 44%),
          hsl(180 82% 44%),
          hsl(210 85% 56%),
          hsl(240 85% 62%),
          hsl(270 82% 62%),
          hsl(300 80% 60%),
          hsl(330 82% 60%),
          hsl(360 95% 58%)
        );
      overflow:hidden;
    }
    .color-spectrum::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0) 45%, rgba(0,0,0,.12));
      pointer-events:none;
    }
    .color-thumb{
      position:absolute; top:50%; transform:translate(-50%,-50%);
      width:22px; height:22px; border-radius:999px;
      border:3px solid #fff; box-shadow:0 0 0 2px rgba(0,0,0,.25);
      pointer-events:none;
    }
    .card { border-radius: 18px; padding: 16px; margin-bottom: 12px; cursor:pointer; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .muted { color: var(--muted); font-size:12px; }
    .btn { border:none; border-radius:12px; padding:10px 14px; cursor:pointer; font-weight:700; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff;
    }
    .btn-dark { background: var(--card2); color: var(--text); border:1px solid var(--line); }
    .scene-shell {
      height: calc(100vh - 57px);
      overflow: auto;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accentSoft) 60%, var(--card)) 0%, var(--card2) 100%);
      position: relative;
      -webkit-overflow-scrolling: touch;
    }
    .scene-shell.lock-scroll {
      overflow: hidden;
    }
    .scene {
      min-height: 900px;
      min-width: 100%;
      position: relative;
      overflow: hidden;
      transform-origin: top center;
      will-change: transform;
    }
    .scene-grid {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .scene-frame {
      position:absolute; inset:18px;
      border:2px solid color-mix(in srgb, var(--accent) 18%, rgba(255,255,255,.06));
      border-radius:18px;
    }
    .room-label {
      position:absolute; top:14px; left:14px;
      background: color-mix(in srgb, var(--card) 85%, transparent);
      border:1px solid var(--line);
      padding:8px 14px; border-radius:12px; font-size:15px; font-weight:700; z-index:5;
      backdrop-filter: blur(10px);
    }
    .scale-bar {
      position: sticky;
      top: 57px;
      z-index: 35;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }
    .item-node {
      position:absolute; transform:translate(-50%,-50%);
      cursor:default; text-align:center; z-index:4; touch-action:none; user-select:none;
      width: 168px;
      transition: transform .12s ease;
    }
    .item-node.pressing {
      transform: translate(-50%,-50%) scale(1.03);
    }
    .item-node.dragging {
      z-index:20;
      transform: translate(-50%,-50%) scale(1.07);
    }
    .item-type {
      margin-bottom:6px; font-size:11px; color:var(--accent); font-weight:700;
      display:block;
    }
    .item-name {
      margin-top:8px; font-size:14px; color:var(--text);
      background: color-mix(in srgb, var(--card) 80%, transparent);
      padding:4px 10px; border-radius:999px;
      display:inline-block; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      border: 1px solid var(--line); font-weight:700;
    }
    .item-model {
      margin-top:4px; font-size:12px; color:var(--muted);
      display:block; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .item-color { margin-top:3px; font-size:11px; color:var(--accent); font-weight:700; }
    .section { border-radius:18px; padding:16px; margin-bottom:14px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .mini { border-radius:14px; padding:12px 14px; }
    .modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,.72);
      display:flex; align-items:center; justify-content:center; padding:16px; z-index:999;
      backdrop-filter: blur(10px);
    }
    .modal {
      width:100%; max-width:760px; max-height:88vh; overflow:auto;
      border-radius:24px; padding:20px;
    }
    input, select, textarea {
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line);
      background: var(--card2); color: var(--text); outline:none;
    }
    textarea { min-height:84px; resize:vertical; }
    label { display:block; margin-bottom:10px; }
    h1,h2,h3,p { margin:0; }
    .empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; }
    .doc-pill {
      display:inline-block; background:var(--card2); border:1px solid var(--line); border-radius:999px;
      padding:6px 10px; font-size:11px; margin:4px 6px 0 0;
    }
    .svg-icon { width: 104px; height: 104px; margin: 0 auto; display:block; filter: drop-shadow(0 10px 18px rgba(0,0,0,.28)); }
    .hint { margin-top: 8px; font-size: 11px; color: var(--muted); }
    .service-card {
      display:block;
      background: var(--card2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-top:8px;
    }
    @media (max-width: 760px) { .grid2, .theme-grid { grid-template-columns:1fr; } }
  </style>
</head>

function Modal({ title, onClose, children }){ return <div className="modal-backdrop" onClick={onClose}><div className="modal" onClick={(e)=>e.stopPropagation()}><div className="row" style={{marginBottom:16}}><h3>{title}</h3><button className="btn btn-dark" onClick={onClose}>Kapat</button></div>{children}</div></div>; }
function TopBar({ title, sub, onBack, right }){ return <div className="topbar">{onBack&&<button className="btn btn-dark" onClick={onBack}>←</button>}<div style={{flex:1}}><div style={{fontSize:17,fontWeight:700}}>{title}</div>{sub&&<div className="muted" style={{marginTop:2}}>{sub}</div>}</div>{right}</div>; }

function ItemForm({ form, setForm }){
  const categoryOptions=Object.keys(ITEM_CATEGORIES);
  const itemOptions=form.category?ITEM_CATEGORIES[form.category]:[];
  const acquisitionMeta = ACQUISITION_OPTIONS[form.acquisitionType] || ACQUISITION_OPTIONS["Satın alındı"];
  function setField(key,value){ setForm(prev=>({ ...prev, [key]: value })); }
  function handleCategoryChange(value){ setForm(prev=>({ ...prev, category:value, selectedName:"", customName:"", name:"", type:"" })); }
  function handleItemSelect(value){
    const found=(ITEM_CATEGORIES[form.category]||[]).find(x=>x.name===value);
    if(value==="Özel Eşya"){ setForm(prev=>({ ...prev, selectedName:value, name:"", type:"Diğer" })); return; }
    setForm(prev=>({ ...prev, selectedName:value, name:found?found.name:value, type:found?found.type:prev.type }));
  }
  function handleCustomName(value){ setForm(prev=>({ ...prev, customName:value, name:value })); }
  function handleInvoiceFiles(e){
    const files = Array.from(e.target.files || []).map(f => ({ id: mkid(), name: f.name, type: "Fatura" }));
    setForm(prev => ({ ...prev, invoiceFiles: files }));
  }
  return <>
    <div className="section" style={{marginBottom:10}}>
      <div style={{fontWeight:700,marginBottom:10}}>Kategori ve Eşya Seçimi</div>
      <div className="grid2">
        <label><div className="muted" style={{marginBottom:4}}>Kategori</div><select value={form.category} onChange={e=>handleCategoryChange(e.target.value)}><option value="">Seçiniz</option>{categoryOptions.map(c=><option key={c} value={c}>{c}</option>)}</select></label>
        <label><div className="muted" style={{marginBottom:4}}>Eşya</div><select value={form.selectedName} onChange={e=>handleItemSelect(e.target.value)} disabled={!form.category}><option value="">Seçiniz</option>{itemOptions.map(i=><option key={i.name} value={i.name}>{i.name}</option>)}</select></label>
      </div>
      {form.selectedName==="Özel Eşya"&&<label><div className="muted" style={{marginBottom:4}}>Özel Eşya Adı</div><input value={form.customName} onChange={e=>handleCustomName(e.target.value)} placeholder="Listede olmayan eşya adı" /></label>}
    </div>
    <div className="grid2">
      <label><div className="muted" style={{marginBottom:4}}>Eşya Adı</div><input value={form.name} readOnly /></label>
      <label><div className="muted" style={{marginBottom:4}}>Tür</div><input value={form.type} readOnly /></label>
      <label><div className="muted" style={{marginBottom:4}}>Marka</div><input value={form.brand} onChange={e=>setField("brand",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>Model adı</div><input value={form.modelName || ""} onChange={e=>setField("modelName",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>Model numarası</div><input value={form.modelNumber || ""} onChange={e=>setField("modelNumber",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>Seri no</div><input value={form.serialNo || ""} onChange={e=>setField("serialNo",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>Renk</div><select value={form.color} onChange={e=>setField("color",e.target.value)}><option value="">Seçiniz</option>{COLOR_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select></label>
      <label><div className="muted" style={{marginBottom:4}}>Edinme şekli</div><select value={form.acquisitionType} onChange={e=>setField("acquisitionType",e.target.value)}>{Object.keys(ACQUISITION_OPTIONS).map(k=><option key={k} value={k}>{k}</option>)}</select></label>
      <label><div className="muted" style={{marginBottom:4}}>{acquisitionMeta.dateLabel}</div><input value={form.acquisitionDate} onChange={e=>setField("acquisitionDate",e.target.value)} /></label>
      <label><div className="muted" style={{marginBottom:4}}>{acquisitionMeta.valueLabel}</div><input value={form.purchasePrice} onChange={e=>setField("purchasePrice",e.target.value)} /></label>
    </div>
    <div className="section" style={{marginTop:10}}>
      <div style={{fontWeight:700,marginBottom:8}}>Fatura Ekle</div>
      <label>
        <div className="muted" style={{marginBottom:4}}>Fatura Dosyaları</div>
        <input type="file" multiple onChange={handleInvoiceFiles} />
      </label>
      <div>
        {(form.invoiceFiles || []).map(f => <span key={f.id} className="doc-pill">{f.name}</span>)}
      </div>
    </div>
  </>;
}

function ServiceForm({ serviceForm, setServiceForm, onAdd }) {
  function setField(key, value){ setServiceForm(prev => ({ ...prev, [key]: value })); }
  return (
    <div className="section">
      <div style={{fontWeight:700,marginBottom:8}}>Servis Formu</div>
      <div className="grid2">
        <label><div className="muted" style={{marginBottom:4}}>Servis tarihi</div><input value={serviceForm.date} onChange={e=>setField("date", e.target.value)} /></label>
        <label><div className="muted" style={{marginBottom:4}}>Durum</div><input value={serviceForm.status} onChange={e=>setField("status", e.target.value)} placeholder="Servise gitti / Tamir edildi / Değişim onayı" /></label>
        <label><div className="muted" style={{marginBottom:4}}>Arıza / Sebep</div><input value={serviceForm.issue} onChange={e=>setField("issue", e.target.value)} /></label>
        <label><div className="muted" style={{marginBottom:4}}>Servis adı</div><input value={serviceForm.serviceName} onChange={e=>setField("serviceName", e.target.value)} /></label>
      </div>
      <label><div className="muted" style={{marginBottom:4}}>Servis notu</div><textarea value={serviceForm.serviceNote} onChange={e=>setField("serviceNote", e.target.value)} /></label>
      <label style={{display:"flex", alignItems:"center", gap:10}}>
        <input style={{width:18,height:18}} type="checkbox" checked={serviceForm.changed} onChange={e=>setField("changed", e.target.checked)} />
        <span>Değişim yapıldı</span>
      </label>
      {serviceForm.changed && (
        <div className="service-card">
          <div className="grid2">
            <label><div className="muted" style={{marginBottom:4}}>Yeni ürün adı</div><input value={serviceForm.changedProductName} onChange={e=>setField("changedProductName", e.target.value)} /></label>
            <label><div className="muted" style={{marginBottom:4}}>Yeni model adı</div><input value={serviceForm.changedModelName} onChange={e=>setField("changedModelName", e.target.value)} /></label>
            <label><div className="muted" style={{marginBottom:4}}>Yeni seri no</div><input value={serviceForm.changedSerialNo} onChange={e=>setField("changedSerialNo", e.target.value)} /></label>
          </div>
        </div>
      )}
      <button className="btn btn-primary" style={{marginTop:10}} onClick={onAdd}>Servis Kaydı Ekle</button>
    </div>
  );
}

function App(){
  const [themeKey, setThemeKey] = useState("royal_navy");
  const [themeLibraryOpen, setThemeLibraryOpen] = useState(false);
  const [customHue, setCustomHue] = useState(220);
  const [scenes,setScenes]=useState(starter);
  const [view,setView]=useState("home");
  const [activeSceneId,setActiveSceneId]=useState("");
  const [activeRoomId,setActiveRoomId]=useState("");
  const [activeItemId,setActiveItemId]=useState("");
  const [modal,setModal]=useState(null);
  const [sceneName,setSceneName]=useState("");
  const [roomName,setRoomName]=useState("");
  const [itemForm,setItemForm]=useState(emptyItemForm());
  const [editForm,setEditForm]=useState(emptyItemForm());
  const [serviceForm,setServiceForm]=useState(emptyServiceForm());
  const [draggingId,setDraggingId]=useState(null);
  const [pressingId,setPressingId]=useState(null);
  const [sceneScale, setSceneScale] = useState(1);
  const sceneRef=useRef(null);
  const sceneShellRef=useRef(null);
  const colorBarRef=useRef(null);
  const pressTimerRef = useRef(null);
  const pressStartRef = useRef({ x: 0, y: 0 });
  const pinchRef=useRef({ distance: null, startScale: 1 });

  useEffect(() => {
    let applied = false;
    for (const group of Object.values(THEME_GROUPS)) {
      if (group[themeKey]) {
        applyTheme(group[themeKey]);
        applied = true;
      }
    }
    if (!applied && themeKey === "custom") {
      applyTheme(hslTheme(customHue));
    }
  }, [themeKey, customHue]);

  const activeScene=useMemo(()=>scenes.find(s=>s.id===activeSceneId)||null,[scenes,activeSceneId]);
  const allItems=useMemo(()=>scenes.flatMap(s=>s.subs.flatMap(r=>r.items)),[scenes]);
  const totalValue=useMemo(()=>scenes.flatMap(s=>s.subs.flatMap(r=>r.items)).reduce((a,i)=>a+(parseFloat(i.purchasePrice)||0),0).toLocaleString("tr-TR"),[scenes]);
  const activeRoom=useMemo(()=>activeScene?activeScene.subs.find(r=>r.id===activeRoomId)||null:null,[activeScene,activeRoomId]);
  const activeItem=useMemo(()=>activeRoom?activeRoom.items.find(i=>i.id===activeItemId)||null:null,[activeRoom,activeItemId]);

  function goScene(id){ setActiveSceneId(id); setView("scene"); }
  function goRoom(id){ setActiveRoomId(id); setView("room"); }
  function goItem(id){ setActiveItemId(id); setView("item"); }
  function addScene(){ if(!sceneName.trim()) return; const next={id:mkid(),name:sceneName.trim(),subs:[]}; setScenes(prev=>[...prev,next]); setSceneName(""); setModal(null); }
  function addRoom(){ if(!roomName.trim()||!activeSceneId) return; const next={id:mkid(),name:roomName.trim(),items:[]}; setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:[...s.subs,next]}:s)); setRoomName(""); setModal(null); }
  function addItem(){
    if(!itemForm.name.trim()||!activeSceneId||!activeRoomId) return;
    const pos = activeRoom ? defaultPos(activeRoom.items.length) : {x:50,y:50};
    const next={id:mkid(), ...itemForm, x:pos.x, y:pos.y, docs:[...(itemForm.invoiceFiles||[])], services:[]};
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:s.subs.map(r=>r.id===activeRoomId?{...r,items:[...r.items,next]}:r)}:s));
    setItemForm(emptyItemForm());
    setModal(null);
  }
  function updateItem(itemId, updater){
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>r.id===activeRoomId?{...r,items:r.items.map(i=>i.id===itemId?updater(i):i)}:r)
    }:s));
  }
  function saveEdit(){
    if(!activeItem || !editForm.name.trim()) return;
    const mergedDocs = [...(activeItem.docs || [])];
    (editForm.invoiceFiles || []).forEach(f => mergedDocs.push(f));
    updateItem(activeItem.id, i => ({ ...i, ...editForm, docs: mergedDocs }));
    setModal(null);
  }
  function addServiceRecord(){
    if(!activeItem || !serviceForm.date || !serviceForm.status) return;
    updateItem(activeItem.id, i => {
      const nextServices = [...(i.services || []), { id: mkid(), ...serviceForm }];
      let updated = { ...i, services: nextServices };
      if (serviceForm.changed) {
        updated = {
          ...updated,
          name: serviceForm.changedProductName || updated.name,
          modelName: serviceForm.changedModelName || updated.modelName,
          serialNo: serviceForm.changedSerialNo || updated.serialNo
        };
      }
      return updated;
    });
    setServiceForm(emptyServiceForm());
  }

  function beginLongPress(itemId, clientX, clientY){
    clearTimeout(pressTimerRef.current);
    setPressingId(itemId);
    pressStartRef.current = { x: clientX, y: clientY };
    pressTimerRef.current = setTimeout(() => {
      setDraggingId(itemId);
    }, 320);
  }
  function cancelLongPress(){
    clearTimeout(pressTimerRef.current);
    pressTimerRef.current = null;
    if (!draggingId) setPressingId(null);
  }
  function startPressMouse(itemId, e){
    e.preventDefault();
    beginLongPress(itemId, e.clientX, e.clientY);
  }
  function startPressTouch(itemId, e){
    const t = e.touches[0];
    beginLongPress(itemId, t.clientX, t.clientY);
  }
  function moveDrag(e){
    const point = e.touches ? e.touches[0] : e;
    if (!draggingId) {
      if (pressingId) {
        const dx = Math.abs(point.clientX - pressStartRef.current.x);
        const dy = Math.abs(point.clientY - pressStartRef.current.y);
        if (dx > 8 || dy > 8) cancelLongPress();
      }
      return;
    }
    if(!sceneRef.current) return;
    e.preventDefault && e.preventDefault();
    const rect = sceneRef.current.getBoundingClientRect();
    let x = ((point.clientX - rect.left) / rect.width) * 100;
    let y = ((point.clientY - rect.top) / rect.height) * 100;
    x = Math.max(8, Math.min(92, x));
    y = Math.max(12, Math.min(88, y));
    updateItem(draggingId, i => ({ ...i, x, y }));
  }
  function endDrag(){
    clearTimeout(pressTimerRef.current);
    pressTimerRef.current = null;
    setDraggingId(null);
    setPressingId(null);
  }
  function handleItemClick(itemId){
    if (!draggingId) goItem(itemId);
  }

  function updateHueFromClientX(clientX){
    const rect = colorBarRef.current.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    setCustomHue(Math.round(ratio * 360));
    setThemeKey("custom");
  }
  function handleColorPointer(e){ updateHueFromClientX(e.clientX); }
  function handleColorMove(e){ if (e.buttons === 1) updateHueFromClientX(e.clientX); }
  function handleColorTouch(e){ if (e.touches[0]) updateHueFromClientX(e.touches[0].clientX); }

  function distance(t1, t2){
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function onSceneTouchStart(e){
    if (e.touches.length === 2) {
      pinchRef.current.distance = distance(e.touches[0], e.touches[1]);
      pinchRef.current.startScale = sceneScale;
      cancelLongPress();
    }
  }
  function onSceneTouchMove(e){
    if (e.touches.length === 2 && pinchRef.current.distance) {
      const newDistance = distance(e.touches[0], e.touches[1]);
      const next = Math.max(0.7, Math.min(2.4, pinchRef.current.startScale * (newDistance / pinchRef.current.distance)));
      setSceneScale(next);
      return;
    }
    moveDrag(e);
  }
  function onSceneTouchEnd(e){
    if (e.touches.length < 2) pinchRef.current.distance = null;
    endDrag();
  }

  return <div className="app">
    {view==="home" && <>
      <TopBar title="Eşyamın Hayatı" sub={`${allItems.length} eşya · ₺${totalValue}`} right={<button className="btn btn-primary" onClick={()=>setModal("scene")}>+ Başlık</button>} />
      <div className="container">
        <div className="section-strip">
          <div className="section-strip-title">Tema Kütüphanesi</div>
          <div className="section-strip-sub">Tema başlığı üst alana taşındı</div>
        </div>

        <div className="hero" style={{cursor:"default"}}>
          <div className="theme-library-head" onClick={()=>setThemeLibraryOpen(v=>!v)}>
            <div>
              <div style={{fontSize:16,fontWeight:700}}>Hazır Tema Setleri</div>
              <div className="muted" style={{marginTop:4}}>Ön tanımlı uyumlu temalar</div>
            </div>
            <button className="btn btn-dark">{themeLibraryOpen ? "Gizle" : "Göster"}</button>
          </div>
          {themeLibraryOpen && <>
            {Object.entries(THEME_GROUPS).map(([groupName, group]) => (
              <div key={groupName}>
                <div className="theme-section-title">{groupName}</div>
                <div className="theme-grid">
                  {Object.entries(group).map(([key, theme]) => (
                    <div key={key} className={`theme-card ${themeKey===key ? 'active' : ''}`} onClick={()=>setThemeKey(key)}>
                      <div className="theme-preview" style={{background:`linear-gradient(135deg, ${theme.accent}, ${theme.accent2})`}} />
                      <div>
                        <div style={{fontWeight:700}}>{theme.label}</div>
                        <div className="muted">{groupName}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div className="color-lab">
              <div style={{fontWeight:700}}>Sonsuz Renk Skalası</div>
              <div className="muted" style={{marginTop:4}}>Tüm renkler 360° spektrum olarak açıldı. Üzerinde gezdikçe tema anında değişir.</div>
              <div
                ref={colorBarRef}
                className="color-spectrum"
                onPointerDown={handleColorPointer}
                onPointerMove={handleColorMove}
                onTouchStart={handleColorTouch}
                onTouchMove={handleColorTouch}
              >
                <div className="color-thumb" style={{ left: `${(customHue/360)*100}%`, background: `hsl(${customHue} 82% 58%)` }} />
              </div>
            </div>
          </>}
        </div>

        <div className="hero" style={{cursor:"default"}}>
          <div style={{fontSize:18,fontWeight:700}}>İkon Kapsamı</div>
          <div className="muted" style={{marginTop:4}}>Elektronik, mobilya, beyaz eşya, mutfak, aydınlatma, kişisel ve araç kategorileri için genişletilmiş çizim seti eklendi.</div>
          <div className="hint">Listeye eklenmeyen özel ürünler şimdilik genel kutu ikonuyla görünür.</div>
        </div>

        {scenes.map(s=><div key={s.id} className="hero" onClick={()=>goScene(s.id)}><div className="hero-grid"><div className="hero-icon">{detectSceneIcon(s.name)}</div><div><div style={{fontSize:20,fontWeight:700}}>{s.name}</div><div className="muted" style={{marginTop:4}}>{s.subs.length} alt başlık</div></div></div></div>)}
      </div>
      {modal==="scene"&&<Modal title="Yeni Başlık" onClose={()=>setModal(null)}><label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneName} onChange={e=>setSceneName(e.target.value)} /></label><button className="btn btn-primary" style={{width:"100%"}} onClick={addScene}>Oluştur</button></Modal>}
    </>}

    {view==="scene"&&activeScene && <>
      <TopBar title={activeScene.name} sub="Başlık paneli" onBack={()=>setView("home")} right={<button className="btn btn-primary" onClick={()=>setModal("room")}>+ Alt Başlık</button>} />
      <div className="container">
        {activeScene.subs.map(r=><div key={r.id} className="card" onClick={()=>goRoom(r.id)}><div className="row"><div><div style={{fontSize:16,fontWeight:700}}>{r.name}</div><div className="muted">{r.items.length} eşya</div></div><div>›</div></div></div>)}
      </div>
      {modal==="room"&&<Modal title="Yeni Alt Başlık" onClose={()=>setModal(null)}><label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label><button className="btn btn-primary" style={{width:"100%"}} onClick={addRoom}>Ekle</button></Modal>}
    </>}

    {view==="room"&&activeRoom && <>
      <TopBar
        title={activeRoom.name}
        sub="Eşyaya kısa süre basılı tut, sonra sürükle"
        onBack={()=>setView("scene")}
        right={<button className="btn btn-primary" onClick={()=>setModal("item")}>+ Eşya</button>}
      />
      <div className="scale-bar">
        <button className="btn btn-dark" onClick={()=>setSceneScale(v=>Math.max(0.7, +(v-0.1).toFixed(2)))}>-</button>
        <div className="muted" style={{minWidth:52, textAlign:"center"}}>%{Math.round(sceneScale*100)}</div>
        <button className="btn btn-dark" onClick={()=>setSceneScale(v=>Math.min(2.4, +(v+0.1).toFixed(2)))}>+</button>
        <input type="range" min="0.7" max="2.4" step="0.01" value={sceneScale} onChange={e=>setSceneScale(Number(e.target.value))} />
      </div>

      <div ref={sceneShellRef} className={`scene-shell ${draggingId ? "lock-scroll" : ""}`}>
        <div
          className="scene"
          ref={sceneRef}
          style={{ transform: `scale(${sceneScale})`, minHeight: `${900 * sceneScale}px` }}
          onMouseMove={moveDrag}
          onMouseUp={endDrag}
          onMouseLeave={endDrag}
          onTouchStart={onSceneTouchStart}
          onTouchMove={onSceneTouchMove}
          onTouchEnd={onSceneTouchEnd}
        >
          <div className="scene-grid"></div>
          <div className="scene-frame"></div>
          <div className="room-label">{activeRoom.name}</div>
          {activeRoom.items.map((item, index)=>{
            const pos = { x: item.x ?? defaultPos(index).x, y: item.y ?? defaultPos(index).y };
            const isDragging = draggingId === item.id;
            const isPressing = pressingId === item.id;
            return <div
              key={item.id}
              className={`item-node ${isDragging ? "dragging" : ""} ${isPressing ? "pressing" : ""}`}
              style={{left:`${pos.x}%`, top:`${pos.y}%`}}
              onMouseDown={(e)=>startPressMouse(item.id, e)}
              onTouchStart={(e)=>startPressTouch(item.id, e)}
              onClick={()=>handleItemClick(item.id)}
            >
              <span className="item-type">{item.type || "-"}</span>
              <ProductIcon item={item} />
              {(item.modelName || item.model) && <div className="item-model">{item.modelName || item.model}</div>}
              <div className="item-name">{item.name}</div>
              {item.color && <div className="item-color">{item.color}</div>}
            </div>;
          })}
          {activeRoom.items.length===0&&<div className="empty">Bu alanda henüz eşya yok</div>}
        </div>
      </div>
      {modal==="item"&&<Modal title="Yeni Eşya" onClose={()=>setModal(null)}><ItemForm form={itemForm} setForm={setItemForm} /><button className="btn btn-primary" style={{width:"100%"}} onClick={addItem}>Kaydet</button></Modal>}
    </>}

    {view==="item"&&activeItem && <>
      <TopBar
        title={activeItem.name}
        sub="Eşyanın detayları"
        onBack={()=>setView("room")}
        right={<button className="btn btn-primary" onClick={()=>{ setEditForm({...activeItem, selectedName:activeItem.name, customName:activeItem.name, invoiceFiles:[]}); setModal("edit"); }}>Düzenle modu</button>}
      />
      <div className="container">
        <div className="card" style={{cursor:"default"}}>
          <div style={{display:"flex", justifyContent:"center", marginBottom:12}}>
            <ProductIcon item={activeItem} />
          </div>
          <div style={{fontWeight:700,marginTop:8}}>{activeItem.name}</div>
          {(activeItem.modelName || activeItem.model) && <div className="muted" style={{marginTop:4}}>Model adı: {activeItem.modelName || activeItem.model}</div>}
          {activeItem.modelNumber && <div className="muted" style={{marginTop:4}}>Model numarası: {activeItem.modelNumber}</div>}
          {activeItem.serialNo && <div className="muted" style={{marginTop:4}}>Seri no: {activeItem.serialNo}</div>}
          {activeItem.color && <div className="muted" style={{marginTop:4}}>Renk: {activeItem.color}</div>}
          <div className="muted" style={{marginTop:4}}>{activeItem.category}</div>
        </div>
        <div className="grid2">
          <div className="mini"><div className="muted">Marka</div><div>{activeItem.brand || "-"}</div></div>
          <div className="mini"><div className="muted">Model adı</div><div>{activeItem.modelName || activeItem.model || "-"}</div></div>
          <div className="mini"><div className="muted">Model numarası</div><div>{activeItem.modelNumber || "-"}</div></div>
          <div className="mini"><div className="muted">Seri no</div><div>{activeItem.serialNo || "-"}</div></div>
          <div className="mini"><div className="muted">Edinme şekli</div><div>{activeItem.acquisitionType || "-"}</div></div>
          <div className="mini"><div className="muted">{(ACQUISITION_OPTIONS[activeItem.acquisitionType] || ACQUISITION_OPTIONS["Satın alındı"]).dateLabel}</div><div>{activeItem.acquisitionDate || "-"}</div></div>
          <div className="mini"><div className="muted">{(ACQUISITION_OPTIONS[activeItem.acquisitionType] || ACQUISITION_OPTIONS["Satın alındı"]).valueLabel}</div><div>{activeItem.purchasePrice ? "₺"+Number(activeItem.purchasePrice).toLocaleString("tr-TR") : "-"}</div></div>
          <div className="mini"><div className="muted">Renk</div><div>{activeItem.color || "-"}</div></div>
        </div>
        <div className="section">
          <div style={{fontWeight:700,marginBottom:8}}>Belgeler</div>
          {(activeItem.docs || []).length === 0 && <div className="muted">Belge yok</div>}
          {(activeItem.docs || []).map(d => <span key={d.id} className="doc-pill">{d.type}: {d.name}</span>)}
        </div>
        <ServiceForm serviceForm={serviceForm} setServiceForm={setServiceForm} onAdd={addServiceRecord} />
        <div className="section">
          <div style={{fontWeight:700,marginBottom:8}}>Servis Geçmişi</div>
          {(activeItem.services || []).length === 0 && <div className="muted">Servis kaydı yok</div>}
          {(activeItem.services || []).map(s => <div key={s.id} className="service-card"><div><b>{s.date}</b> · {s.status}</div>{s.issue && <div className="muted" style={{marginTop:4}}>Arıza: {s.issue}</div>}{s.serviceName && <div className="muted" style={{marginTop:4}}>Servis: {s.serviceName}</div>}{s.serviceNote && <div className="muted" style={{marginTop:4}}>Not: {s.serviceNote}</div>}{s.changed && <div className="muted" style={{marginTop:4}}>Değişim: {s.changedProductName || "-"} / {s.changedModelName || "-"} / {s.changedSerialNo || "-"}</div>}</div>)}
        </div>
      </div>
      {modal==="edit"&&<Modal title="Eşyayı Düzenle" onClose={()=>setModal(null)}><ItemForm form={editForm} setForm={setEditForm} /><button className="btn btn-primary" style={{width:"100%"}} onClick={saveEdit}>Güncelle</button></Modal>}
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eşyanın Hayatı</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; background:#0a0a0c; color:#fff; font-family: Arial; }
button { cursor:pointer }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

// basit iconlar (lucide yerine)
const Home = () => <div>🏠</div>;
const Plus = () => <div>➕</div>;

function App() {
  const [scenes, setScenes] = useState([
    { id: "1", name: "Evim", subs: [] }
  ]);

  const [currentScene, setCurrentScene] = useState(null);
  const [currentRoom, setCurrentRoom] = useState(null);

  const [modal, setModal] = useState(null);
  const [input, setInput] = useState("");

  function addScene() {
    if(!input) return;
    setScenes([...scenes, { id: Date.now()+"", name: input, subs: [] }]);
    setInput("");
    setModal(null);
  }

  function addRoom() {
    if(!input) return;

    setScenes(scenes.map(s => {
      if(s.id === currentScene.id){
        return {...s, subs: [...s.subs, { id: Date.now()+"", name: input, items: [] }]};
      }
      return s;
    }));

    setInput("");
    setModal(null);
  }

  function addItem(name){
    if(!name) return;

    setScenes(scenes.map(s=>{
      if(s.id === currentScene.id){
        return {
          ...s,
          subs: s.subs.map(r=>{
            if(r.id === currentRoom.id){
              return {
                ...r,
                items: [...r.items, { id: Date.now()+"", name }]
              }
            }
            return r;
          })
        }
      }
      return s;
    }));
  }

  // HOME
  if(!currentScene){
    return (
      <div style={{padding:20}}>
        <h2>Eşyanın Hayatı</h2>

        {scenes.map(s=>(
          <div key={s.id}
            style={{padding:15, background:"#1a1a1a", marginBottom:10, borderRadius:10}}
            onClick={()=>setCurrentScene(s)}
          >
            {s.name}
          </div>
        ))}

        <button onClick={()=>setModal("scene")}>+ Başlık Ekle</button>

        {modal==="scene" && (
          <div style={{marginTop:20}}>
            <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Başlık adı"/>
            <button onClick={addScene}>Ekle</button>
          </div>
        )}
      </div>
    )
  }

  // SCENE
  if(currentScene && !currentRoom){
    return (
      <div style={{padding:20}}>
        <button onClick={()=>setCurrentScene(null)}>← Geri</button>
        <h2>{currentScene.name}</h2>

        {currentScene.subs.map(r=>(
          <div key={r.id}
            style={{padding:15, background:"#1a1a1a", marginBottom:10, borderRadius:10}}
            onClick={()=>setCurrentRoom(r)}
          >
            {r.name}
          </div>
        ))}

        <button onClick={()=>setModal("room")}>+ Oda Ekle</button>

        {modal==="room" && (
          <div style={{marginTop:20}}>
            <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Oda adı"/>
            <button onClick={addRoom}>Ekle</button>
          </div>
        )}
      </div>
    )
  }

  // ROOM
  return (
    <div style={{padding:20}}>
      <button onClick={()=>setCurrentRoom(null)}>← Geri</button>
      <h2>{currentRoom.name}</h2>

      {currentRoom.items.map(i=>(
        <div key={i.id}
          style={{padding:12, background:"#222", marginBottom:8, borderRadius:8}}
        >
          {i.name}
        </div>
      ))}

      <button onClick={()=>setModal("item")}>+ Eşya Ekle</button>

      {modal==="item" && (
        <div style={{marginTop:20}}>
          <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Eşya adı"/>
          <button onClick={()=>{addItem(input); setInput("");}}>Ekle</button>
        </div>
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>

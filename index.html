<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eşyamın Hayatı</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{margin:0;background:#0a0a0c;color:#fff;font-family:Arial}
.top{padding:14px;border-bottom:1px solid #222;display:flex;justify-content:space-between}
.container{padding:16px}
.card{background:#141416;padding:14px;border-radius:12px;margin-bottom:10px;cursor:pointer}
.scene{height:100vh;position:relative;background:#0f0f12}
.item{position:absolute;transform:translate(-50%,-50%);text-align:center}
.name{font-size:12px;margin-top:4px}
.model{font-size:10px;color:#888}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState} = React

const icons = {
telefon:"📱",
televizyon:"📺",
laptop:"💻",
koltuk:"🛋️",
buzdolabı:"🧊",
default:"📦"
}

function getIcon(name){
const t=name.toLowerCase()
if(t.includes("telefon")) return icons.telefon
if(t.includes("telev")) return icons.televizyon
if(t.includes("laptop")) return icons.laptop
if(t.includes("koltuk")) return icons.koltuk
if(t.includes("buz")) return icons.buzdolabı
return icons.default
}

export default function App(){

const [view,setView]=useState("home")
const [items,setItems]=useState([
{id:"1",name:"Telefon",model:"iPhone 15",color:"#3b82f6",x:50,y:30},
{id:"2",name:"Telefon",model:"S24",color:"#ef4444",x:60,y:60}
])

function move(id,x,y){
setItems(prev=>prev.map(i=>i.id===id?{...i,x,y}:i))
}

return(
<div>

{view==="home"&&(
<div>
<div className="top">
<div>Eşyamın Hayatı</div>
<button onClick={()=>setView("room")}>Gir</button>
</div>
</div>
)}

{view==="room"&&(
<div className="scene"
onMouseMove={(e)=>{
if(!window.drag) return
const rect=e.currentTarget.getBoundingClientRect()
let x=((e.clientX-rect.left)/rect.width)*100
let y=((e.clientY-rect.top)/rect.height)*100
move(window.drag,x,y)
}}
onMouseUp={()=>window.drag=null}
>

{items.map(i=>(
<div
key={i.id}
className="item"
style={{left:i.x+"%",top:i.y+"%"}}
onMouseDown={()=>window.drag=i.id}
>

<div style={{
fontSize:44,
color:i.color
}}>
{getIcon(i.name)}
</div>

<div className="name">{i.name}</div>
<div className="model">{i.model}</div>

</div>
))}

</div>
)}

</div>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Eşyamın Hayatı</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { overscroll-behavior: none; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }

    .app {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, var(--glow1) 0%, transparent 24%),
        radial-gradient(circle at bottom left, var(--glow2) 0%, transparent 20%),
        var(--bg);
      transition: background .25s ease, color .25s ease;
    }

    .topbar {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display:flex; align-items:center; gap:10px;
      position:sticky; top:0; z-index:40;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }

    .container { padding: 18px; }

    .hero, .card, .mini, .modal, .section {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }

    .hero { border-radius: 22px; padding: 16px; margin-bottom: 14px; cursor: pointer; }
    .hero-grid { display:grid; grid-template-columns: 76px 1fr; gap:14px; align-items:center; }
    .hero-icon {
      width:76px; height:76px; border-radius:24px;
      display:flex; align-items:center; justify-content:center;
      font-size:38px;
      background: linear-gradient(135deg, var(--accentSoft), var(--card2));
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    }

    .summary-stack { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .summary-pill {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background: color-mix(in srgb, var(--card2) 86%, transparent);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 10px;
      font-size:12px;
      color:var(--text);
    }
    .summary-pill strong { font-size:12px; }
    .summary-total { margin-top:8px; font-size:13px; font-weight:800; color:var(--text); }

    .theme-title-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
      padding:14px 16px;
      cursor:pointer;
      border-radius:18px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--card2) 94%, transparent), color-mix(in srgb, var(--card) 96%, transparent));
      border:1px solid color-mix(in srgb, var(--accent) 22%, var(--line));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -1px 0 rgba(0,0,0,.22),
        0 10px 28px rgba(0,0,0,.16);
    }

    .theme-title-text {
      font-size:20px;
      font-weight:900;
      letter-spacing:.3px;
      color:var(--text);
      text-shadow:
        0 1px 0 rgba(255,255,255,.08),
        0 2px 10px rgba(0,0,0,.28);
    }

    .theme-section-title {
      font-size: 14px; font-weight: 700; margin: 14px 0 8px; color: var(--muted);
    }

    .theme-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }

    .theme-card {
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      background: var(--card2);
      cursor:pointer;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .theme-card.active { outline: 2px solid var(--accent); }

    .theme-preview {
      width:54px; height:54px; border-radius:14px; flex-shrink:0;
      border:1px solid rgba(255,255,255,.14);
    }

    .color-lab {
      background: var(--card2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-top:12px;
    }

    .theme-custom-grid {
      display:grid;
      grid-template-columns: 84px 1fr;
      gap:12px;
      align-items:center;
      margin-top:14px;
    }

    .theme-color-picker {
      width:84px;
      height:84px;
      padding:0;
      border:none;
      border-radius:18px;
      background:transparent;
      overflow:hidden;
      cursor:pointer;
    }

    .theme-color-picker::-webkit-color-swatch-wrapper { padding:0; }
    .theme-color-picker::-webkit-color-swatch {
      border:none;
      border-radius:18px;
    }

    .theme-slider-stack {
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .theme-slider-row {
      display:grid;
      grid-template-columns: 58px 1fr 52px;
      gap:10px;
      align-items:center;
    }

    .theme-slider-row input[type="range"] {
      padding:0;
      height:8px;
      background:transparent;
    }

    .theme-slider-value {
      font-size:12px;
      color:var(--muted);
      text-align:right;
      font-weight:700;
    }

    .nature-grid {
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:8px;
      margin-top:12px;
    }

    .nature-chip {
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:var(--card);
      cursor:pointer;
      display:flex;
      gap:10px;
      align-items:center;
      min-height:58px;
    }

    .nature-chip.active { outline:2px solid var(--accent); }

    .nature-swatch {
      width:26px; height:26px; border-radius:999px; flex-shrink:0;
      border:1px solid rgba(255,255,255,.18);
    }

    .scene-swipe-wrap {
      position:relative;
      overflow:hidden;
      border-radius:22px;
      margin-bottom:14px;
    }

    .scene-swipe-actions {
      position:absolute;
      inset:0 0 0 auto;
      width:176px;
      display:flex;
      align-items:stretch;
      justify-content:flex-end;
      gap:8px;
      padding:0 0 0 8px;
    }

    .scene-action-btn {
      border:none;
      width:84px;
      border-radius:18px;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }

    .scene-action-edit { background: linear-gradient(135deg, #475569, #334155); }
    .scene-action-delete { background: linear-gradient(135deg, #ef4444, #dc2626); }

    .scene-swipe-card {
      position:relative;
      z-index:2;
      transition:transform .22s ease;
      margin-bottom:0;
    }

    .scene-swipe-card.revealed { transform:translateX(-176px); }

    .card { border-radius: 18px; padding: 16px; margin-bottom: 12px; cursor:pointer; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .muted { color: var(--muted); font-size:12px; }

    .btn {
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color:#fff;
    }

    .btn-dark {
      background: var(--card2);
      color: var(--text);
      border:1px solid var(--line);
    }

    .item-list {
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .item-node {
      position:relative;
      cursor:grab;
      z-index:4;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      -webkit-user-drag:none;
      width:100%;
      transition: transform .08s ease, opacity .12s ease, box-shadow .12s ease;
    }

    .item-node, .item-node * {
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      -webkit-user-drag:none;
    }

    .item-node.press-ready { transform:scale(0.992); }

    .item-node.dragging {
      z-index:20;
      cursor:grabbing;
      opacity:.92;
      transform:scale(1.02) rotate(-1deg);
      animation:itemWiggle .18s ease-in-out infinite alternate;
    }

    @keyframes itemWiggle {
      from { transform:scale(1.02) rotate(-1deg); }
      to { transform:scale(1.02) rotate(1deg); }
    }

    .item-banner {
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border:1px solid var(--line);
      border-radius:20px;
      padding:12px 14px;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      min-height:112px;
    }

    .item-banner-icon {
      width:84px;
      height:84px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:16px;
      background:linear-gradient(135deg, var(--accentSoft), var(--card2));
      border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
      overflow:hidden;
      font-size:42px;
    }

    .item-banner-body {
      flex:1;
      min-width:0;
      text-align:left;
    }

    .item-banner-name {
      font-size:15px;
      font-weight:800;
      color:var(--text);
      margin-bottom:6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .item-banner-line {
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top:3px;
    }

    .item-banner-meta-row {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .item-meta-chip {
      border:1px solid var(--line);
      background:color-mix(in srgb, var(--card2) 88%, transparent);
      border-radius:999px;
      padding:6px 10px;
      font-size:11px;
      color:var(--text);
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .item-banner-value {
      margin-top:8px;
      font-size:13px;
      font-weight:800;
      color:var(--text);
    }

    .section { border-radius:18px; padding:16px; margin-bottom:14px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .mini { border-radius:14px; padding:12px 14px; }

    .modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,.72);
      display:flex; align-items:center; justify-content:center; padding:16px; z-index:999;
      backdrop-filter: blur(10px);
    }

    .modal {
      width:100%; max-width:860px; max-height:88vh; overflow:auto;
      border-radius:24px; padding:20px;
    }

    input, select, textarea {
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line);
      background: var(--card2); color: var(--text); outline:none;
      font-size:16px;
    }

    textarea { min-height:84px; resize:vertical; }
    label { display:block; margin-bottom:10px; }
    h1,h2,h3,p { margin:0; }

    .doc-pill {
      display:inline-block;
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      font-size:11px;
      margin:4px 6px 0 0;
      cursor:pointer;
    }

    .service-card {
      display:block;
      background: var(--card2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-top:8px;
    }

    .file-view {
      width:100%;
      min-height:420px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    .topbar-menu-wrap { position:relative; }

    .topbar-icon-btn {
      width:42px;
      height:42px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:20px;
      font-weight:800;
      color:var(--text);
      background:var(--card2);
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .topbar-menu {
      position:absolute;
      top:48px;
      right:0;
      min-width:180px;
      padding:8px;
      border-radius:16px;
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:0 18px 40px rgba(0,0,0,.28);
      z-index:120;
    }

    .topbar-menu-item {
      width:100%;
      border:none;
      background:transparent;
      color:var(--text);
      text-align:left;
      padding:12px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
    }

    .topbar-menu-item:hover {
      background:color-mix(in srgb, var(--card2) 88%, transparent);
    }

    .topbar-menu-item.danger { color:#fecaca; }

    @media (max-width: 760px) {
      .grid2, .grid3, .theme-grid, .nature-grid { grid-template-columns:1fr; }
      .item-banner-icon { width:72px; height:72px; font-size:36px; }
      .scene-swipe-actions { width:160px; }
      .scene-swipe-card.revealed { transform:translateX(-160px); }
      .scene-action-btn { width:76px; }
      .theme-custom-grid { grid-template-columns:1fr; }
    }
  </style>
</head>

function hslTheme(h, sat=82, light=58){
  return {
    label: "Özel",
    bg: `hsl(${h} 28% 9%)`,
    text: `hsl(${h} 35% 96%)`,
    muted: `hsl(${h} 18% 72%)`,
    card: `hsl(${h} 24% 14%)`,
    card2: `hsl(${h} 24% 18%)`,
    line: `hsl(${h} 20% 28%)`,
    accent: `hsl(${h} ${sat}% ${light}%)`,
    accent2: `hsl(${(h+28)%360} ${Math.max(40,sat-8)}% ${Math.min(68,light+4)}%)`,
    accentSoft: `hsl(${h} 42% 20%)`,
    glow1: `hsla(${h} ${sat}% ${light}% / .14)`,
    glow2: `hsla(${(h+28)%360} ${Math.max(40,sat-8)}% ${Math.min(68,light+4)}% / .08)`
  };
}

function hexToHsl(hex){
  let r = 0, g = 0, b = 0;
  const clean = hex.replace("#","");

  if (clean.length === 3) {
    r = parseInt(clean[0] + clean[0], 16);
    g = parseInt(clean[1] + clean[1], 16);
    b = parseInt(clean[2] + clean[2], 16);
  } else if (clean.length === 6) {
    r = parseInt(clean.slice(0,2), 16);
    g = parseInt(clean.slice(2,4), 16);
    b = parseInt(clean.slice(4,6), 16);
  }

  r /= 255; g /= 255; b /= 255;

  const max = Math.max(r,g,b);
  const min = Math.min(r,g,b);
  let h = 0, s = 0;
  const l = (max + min) / 2;
  const d = max - min;

  if (d !== 0) {
    s = d / (1 - Math.abs(2 * l - 1));
    switch (max) {
      case r: h = 60 * (((g - b) / d) % 6); break;
      case g: h = 60 * (((b - r) / d) + 2); break;
      case b: h = 60 * (((r - g) / d) + 4); break;
      default: break;
    }
  }

  if (h < 0) h += 360;

  return {
    hue: Math.round(h),
    sat: Math.round(s * 100),
    light: Math.round(l * 100)
  };
}

function hslToHex(h, s, l){
  s /= 100;
  l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;

  if (h >= 0 && h < 60) [r,g,b] = [c,x,0];
  else if (h < 120) [r,g,b] = [x,c,0];
  else if (h < 180) [r,g,b] = [0,c,x];
  else if (h < 240) [r,g,b] = [0,x,c];
  else if (h < 300) [r,g,b] = [x,0,c];
  else [r,g,b] = [c,0,x];

  const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2,"0");
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

function parseGuaranteeMonths(text=""){
  const raw = String(text || "").toLowerCase().trim();
  if (!raw) return 0;
  const n = parseInt(raw.match(/\d+/)?.[0] || "0", 10);
  if (!n) return 0;
  if (raw.includes("yıl") || raw.includes("sene")) return n * 12;
  return n;
}

function getWarrantyStartDate(itemOrForm){
  return (
    itemOrForm.firstOwnerPurchaseDate ||
    itemOrForm.acquiredByUserDate ||
    itemOrForm.productionDate ||
    ""
  );
}

function calculateRemainingWarrantyText(itemOrForm){
  const manufacturerMonths = parseGuaranteeMonths(itemOrForm.manufacturerWarrantyDuration || itemOrForm.guaranteeDuration || "");
  const extraMonths = parseGuaranteeMonths(itemOrForm.extraWarrantyDuration || "");
  const totalMonths = manufacturerMonths + extraMonths;

  if (!totalMonths) return "Garanti: Yok / Belirsiz";

  const startRaw = getWarrantyStartDate(itemOrForm);
  if (!startRaw) return "Garanti: Başlangıç tarihi eksik";

  const start = new Date(startRaw);
  if (Number.isNaN(start.getTime())) return "Garanti: Başlangıç tarihi eksik";

  const end = new Date(start);
  end.setMonth(end.getMonth() + totalMonths);

  const now = new Date();
  const diff = end.getTime() - now.getTime();

  if (diff <= 0) return "Garanti: Bitti";

  const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
  if (days < 30) return `Garanti: ${days} gün kaldı`;

  const months = Math.floor(days / 30);
  const remainDays = days % 30;

  if (remainDays === 0) return `Garanti: ${months} ay kaldı`;
  return `Garanti: ${months} ay ${remainDays} gün kaldı`;
}

function getGuaranteeRemainingLabel(item){
  return calculateRemainingWarrantyText(item);
}

function formatCurrency(value, currency="TRY"){
  const n = Number(value || 0);
  if (!n) return "-";
  const symbol = currency === "USD" ? "$" : currency === "EUR" ? "€" : currency === "GBP" ? "£" : "₺";
  return symbol + n.toLocaleString("tr-TR");
}

function buildCategorySummary(items=[]){
  const map = {};
  items.forEach(item => {
    const key = item.category || item.type || "Diğer";
    if (!map[key]) map[key] = { count:0, value:0 };
    map[key].count += 1;
    map[key].value += Number(item.purchasePrice || 0);
  });
  return Object.entries(map)
    .sort((a,b) => b[1].value - a[1].value || b[1].count - a[1].count)
    .map(([name, meta]) => ({ name, ...meta }));
}

function TopBar({ title, sub, onBack, right, menuActions = [] }){
  const [open, setOpen] = useState(false);

  useEffect(() => {
    function closeMenu(){ setOpen(false); }
    window.addEventListener("click", closeMenu);
    return () => window.removeEventListener("click", closeMenu);
  }, []);

  return (
    <div className="topbar">
      {onBack && <button className="btn btn-dark" onClick={onBack}>←</button>}
      <div style={{flex:1}}>
        <div style={{fontSize:17,fontWeight:700}}>{title}</div>
        {sub && <div className="muted" style={{marginTop:2}}>{sub}</div>}
      </div>
      {right}
      {!!menuActions.length && (
        <div className="topbar-menu-wrap" onClick={(e)=>e.stopPropagation()}>
          <button
            className="topbar-icon-btn"
            onClick={(e)=>{
              e.stopPropagation();
              setOpen(v=>!v);
            }}
          >
            ⋯
          </button>

          {open && (
            <div className="topbar-menu">
              {menuActions.map(action => (
                <button
                  key={action.label}
                  className={`topbar-menu-item ${action.danger ? "danger" : ""}`}
                  onClick={()=>{
                    setOpen(false);
                    action.onClick();
                  }}
                >
                  {action.label}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

        </label>

        <label>
          <div className="muted" style={{marginBottom:4}}>Üretici Garantisi Süresi</div>
          <input value={form.manufacturerWarrantyDuration} onChange={e=>setField("manufacturerWarrantyDuration", e.target.value)} placeholder="Örn: 24 ay / 2 yıl" />
        </label>

        <label>
          <div className="muted" style={{marginBottom:4}}>Ek Garanti Süresi</div>
          <input value={form.extraWarrantyDuration} onChange={e=>setField("extraWarrantyDuration", e.target.value)} placeholder="Örn: 12 ay" />
        </label>

        <label>
          <div className="muted" style={{marginBottom:4}}>Kalan Garanti Süresi</div>
          <input value={form.remainingWarrantyText || calculateRemainingWarrantyText(form)} readOnly />
        </label>

        <label>
          <div className="muted" style={{marginBottom:4}}>Şu An Kullanım Durumu</div>
          <select value={form.usageStatus} onChange={e=>setField("usageStatus", e.target.value)}>
            {usageOptions.map(x => <option key={x} value={x}>{x}</option>)}
          </select>
        </label>
      </div>

      <div className="section" style={{marginTop:10}}>
        <div style={{fontWeight:700,marginBottom:8}}>Fatura Ekle</div>
        <label>
          <div className="muted" style={{marginBottom:4}}>Fatura Dosyaları</div>
          <input type="file" multiple onChange={handleInvoiceFiles} />
        </label>
        <div>
          {(form.invoiceFiles || []).map(f => <span key={f.id} className="doc-pill">{f.name}</span>)}
        </div>
      </div>
    </div>
  </>;
}

function ServiceForm({ serviceForm, setServiceForm, onAdd }) {
  function setField(key, value){ setServiceForm(prev => ({ ...prev, [key]: value })); }

  return (
    <div className="section">
      <div style={{fontWeight:700,marginBottom:8}}>Servis Formu</div>

      <div className="grid2">
        <label><div className="muted" style={{marginBottom:4}}>Servis tarihi</div><input type="date" value={serviceForm.date} onChange={e=>setField("date", e.target.value)} /></label>
        <label><div className="muted" style={{marginBottom:4}}>Durum</div><input value={serviceForm.status} onChange={e=>setField("status", e.target.value)} placeholder="Servise gitti / Tamir edildi / Değişim onayı" /></label>
        <label><div className="muted" style={{marginBottom:4}}>Arıza / Sebep</div><input value={serviceForm.issue} onChange={e=>setField("issue", e.target.value)} /></label>
        <label><div className="muted" style={{marginBottom:4}}>Servis adı</div><input value={serviceForm.serviceName} onChange={e=>setField("serviceName", e.target.value)} /></label>
      </div>

      <label><div className="muted" style={{marginBottom:4}}>Servis notu</div><textarea value={serviceForm.serviceNote} onChange={e=>setField("serviceNote", e.target.value)} /></label>

      <label style={{display:"flex", alignItems:"center", gap:10}}>

        <div className="service-card">
          <div className="grid2">

            <label><div className="muted" style={{marginBottom:4}}>Yeni model adı</div><input value={serviceForm.changedModelName} onChange={e=>setField("changedModelName", e.target.value)} /></label>
            <label><div className="muted" style={{marginBottom:4}}>Yeni seri no</div><input value={serviceForm.changedSerialNo} onChange={e=>setField("changedSerialNo", e.target.value)} /></label>

        </div>

      <button className="btn btn-primary" style={{marginTop:10}} onClick={onAdd}>Servis Kaydı Ekle</button>

}

function SceneSwipeCard({ scene, onOpen, onEdit, onDelete, isRevealed, onReveal, onClose }) {
  const touchRef = useRef({ startX:0, startY:0 });
  const items = scene.subs.flatMap(sub => sub.items || []);
  const summary = buildCategorySummary(items);

  function onTouchStart(e){
    const t = e.touches[0];
    touchRef.current = { startX:t.clientX, startY:t.clientY };
  }

  function onTouchEnd(e){
    const t = e.changedTouches[0];
    const dx = t.clientX - touchRef.current.startX;
    const dy = Math.abs(t.clientY - touchRef.current.startY);
    if (dy > 50) return;
    if (dx < -40) onReveal(scene.id);
    if (dx > 40) onClose();
  }

  return (
    <div className="scene-swipe-wrap">
      <div className="scene-swipe-actions">
        <button className="scene-action-btn scene-action-edit" onClick={onEdit}>Düzenle</button>
        <button className="scene-action-btn scene-action-delete" onClick={onDelete}>Sil</button>
      </div>
      <div
        className={`hero scene-swipe-card ${isRevealed ? 'revealed' : ''}`}
        onClick={onOpen}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div className="hero-grid">
          <div className="hero-icon">{detectSceneIcon(scene.name)}</div>
          <div>
            <div style={{fontSize:20,fontWeight:700}}>{scene.name}</div>
            <div className="muted" style={{marginTop:4}}>{scene.subs.length} alt başlık · {items.length} eşya</div>
            {!!summary.length && <div className="summary-stack">
              {summary.slice(0,3).map(row => (
                <div className="summary-pill" key={row.name}>
                  <span>{row.name}</span>
                  <strong>{row.count} adet · {formatCurrency(row.value)}</strong>
                </div>
              ))}
              <div className="summary-total">Genel toplam: {formatCurrency(items.reduce((a,b)=>a+Number(b.purchasePrice||0),0))}</div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function ItemSortableCard({ item, isDragging, isPressReady, onPointerDown, onTouchStart, onPressCancel, onOpen }) {
  return (
    <div
      className={`item-node ${isDragging ? "dragging" : ""} ${isPressReady ? "press-ready" : ""}`}
      onMouseDown={onPointerDown}
      onTouchStart={onTouchStart}
      onMouseUp={onPressCancel}
      onMouseLeave={onPressCancel}

function App(){
  const [themeKey, setThemeKey] = useState("royal_navy");
  const [themeLibraryOpen, setThemeLibraryOpen] = useState(false);
  const [customTheme, setCustomTheme] = useState({ hue:220, sat:82, light:58 });
  const [selectedNature, setSelectedNature] = useState(null);
  const [themePickerHex, setThemePickerHex] = useState("#3b82f6");

  const [scenes,setScenes]=useState(starter);
  const [view,setView]=useState("home");
  const [activeSceneId,setActiveSceneId]=useState("");
  const [activeRoomId,setActiveRoomId]=useState("");
  const [activeItemId,setActiveItemId]=useState("");

  const [modal,setModal]=useState(null);
  const [sceneName,setSceneName]=useState("");
  const [sceneEditName,setSceneEditName]=useState("");
  const [roomName,setRoomName]=useState("");
  const [itemForm,setItemForm]=useState(emptyItemForm());
  const [editForm,setEditForm]=useState(emptyItemForm());
  const [serviceForm,setServiceForm]=useState(emptyServiceForm());

  const [draggingId,setDraggingId]=useState(null);
  const [pressReadyId,setPressReadyId]=useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [sceneDeleteConfirm, setSceneDeleteConfirm] = useState(null);
  const [filePreview, setFilePreview] = useState(null);
  const [revealedSceneId, setRevealedSceneId] = useState(null);
  const [revealedRoomId, setRevealedRoomId] = useState(null);
  const [roomDeleteConfirm, setRoomDeleteConfirm] = useState(null);

  const colorBarRef=useRef(null);
  const dragIndexRef = useRef(null);
  const longPressTimerRef = useRef(null);

  useEffect(() => {
    let applied = false;
    for (const group of Object.values(THEME_GROUPS)) {
      if (group[themeKey]) {
        applyTheme(group[themeKey]);
        applied = true;
      }
    }
    if (!applied && themeKey === "custom") {
      applyTheme(hslTheme(customTheme.hue, customTheme.sat, customTheme.light));
    }
  }, [themeKey, customTheme]);

  useEffect(() => {
    setThemePickerHex(hslToHex(customTheme.hue, customTheme.sat, customTheme.light));
  }, [customTheme]);

  const activeScene = useMemo(() => scenes.find(s => s.id === activeSceneId) || null, [scenes, activeSceneId]);
  const allItems = useMemo(() => scenes.flatMap(s => s.subs.flatMap(r => r.items)), [scenes]);
  const totalValue = useMemo(
    () => scenes.flatMap(s => s.subs.flatMap(r => r.items)).reduce((a,i)=>a+(parseFloat(i.purchasePrice)||0),0).toLocaleString("tr-TR"),
    [scenes]
  );
  const activeRoom = useMemo(() => activeScene ? activeScene.subs.find(r => r.id === activeRoomId) || null : null, [activeScene, activeRoomId]);
  const activeItem = useMemo(() => activeRoom ? activeRoom.items.find(i => i.id === activeItemId) || null : null, [activeRoom, activeItemId]);

  function goScene(id){ setActiveSceneId(id); setView("scene"); setRevealedSceneId(null); }
  function goRoom(id){ setActiveRoomId(id); setView("room"); setRevealedRoomId(null); }
  function goItem(id){ setActiveItemId(id); setView("item"); }

  function addScene(){
    if(!sceneName.trim()) return;
    const next={id:mkid(),name:sceneName.trim(),subs:[]};
    setScenes(prev=>[...prev,next]);
    setSceneName("");
    setModal(null);
  }

  function saveSceneEdit(){
    if(!sceneEditName.trim() || !activeSceneId) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,name:sceneEditName.trim()}:s));
    setModal(null);
  }

  function deleteScene(){
    if(!sceneDeleteConfirm) return;
    setScenes(prev=>prev.filter(s=>s.id!==sceneDeleteConfirm));
    setSceneDeleteConfirm(null);
    setView("home");
    setActiveSceneId("");
    setRevealedSceneId(null);
  }

  function deleteRoom(){
    if(!roomDeleteConfirm || !activeSceneId) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:s.subs.filter(r=>r.id!==roomDeleteConfirm)}:s));
    setRoomDeleteConfirm(null);
    setRevealedRoomId(null);
    setView("scene");
  }

  function editRoom(room){
    setActiveRoomId(room.id);
    setRoomName(room.name);
    setModal("roomEdit");
  }

  function saveRoomEdit(){
    if(!roomName.trim() || !activeSceneId || !activeRoomId) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:s.subs.map(r=>r.id===activeRoomId?{...r,name:roomName.trim()}:r)}:s));
    setRoomName("");
    setModal(null);
    setRevealedRoomId(null);
  }

  function addRoom(){
    if(!roomName.trim()||!activeSceneId) return;
    const next={id:mkid(),name:roomName.trim(),items:[]};
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{...s,subs:[...s.subs,next]}:s));
    setRoomName("");
    setModal(null);
  }

  function addItem(){
    if(!itemForm.name.trim()||!activeSceneId||!activeRoomId) return;
    const next={
      id:mkid(),
      ...itemForm,
      docs:[...(itemForm.invoiceFiles||[])],
      services:[],
      remainingWarrantyText: calculateRemainingWarrantyText(itemForm)
    };
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>r.id===activeRoomId?{...r,items:[...r.items,next]}:r)
    }:s));
    setItemForm(emptyItemForm());
    setModal(null);
  }

  function updateItem(itemId, updater){
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>r.id===activeRoomId?{
        ...r,
        items:r.items.map(i=>i.id===itemId?updater(i):i)
      }:r)
    }:s));
  }

  function deleteActiveItem(){
    if(!activeItem) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>r.id===activeRoomId?{
        ...r,
        items:r.items.filter(i=>i.id!==activeItem.id)
      }:r)
    }:s));
    setDeleteConfirm(null);
    setView("room");
  }

  function saveEdit(){
    if(!activeItem || !editForm.name.trim()) return;
    const mergedDocs = [...(activeItem.docs || [])];
    (editForm.invoiceFiles || []).forEach(f => mergedDocs.push(f));

    const nextForm = {
      ...editForm,
      docs: mergedDocs,
      remainingWarrantyText: calculateRemainingWarrantyText(editForm)
    };

    updateItem(activeItem.id, i => ({ ...i, ...nextForm }));
    setModal(null);
  }

  function addServiceRecord(){
    if(!activeItem || !serviceForm.date || !serviceForm.status) return;
    updateItem(activeItem.id, i => {
      const nextServices = [...(i.services || []), { id: mkid(), ...serviceForm }];
      let updated = { ...i, services: nextServices };
      if (serviceForm.changed) {
        updated = {
          ...updated,
          name: serviceForm.changedProductName || updated.name,
          modelName: serviceForm.changedModelName || updated.modelName,
          serialNo: serviceForm.changedSerialNo || updated.serialNo
        };
      }
      return updated;
    });
    setServiceForm(emptyServiceForm());
  }

  function reorderRoomItems(fromIndex, toIndex){
    if (fromIndex === toIndex || fromIndex == null || toIndex == null) return;
    setScenes(prev=>prev.map(s=>s.id===activeSceneId?{
      ...s,
      subs:s.subs.map(r=>{
        if (r.id !== activeRoomId) return r;
        const nextItems = [...r.items];
        const [moved] = nextItems.splice(fromIndex, 1);
        nextItems.splice(toIndex, 0, moved);
        return { ...r, items: nextItems };
      })
    }:s));
  }

  function startDrag(itemId, index, e){
    clearTimeout(longPressTimerRef.current);
    setPressReadyId(itemId);
    const activate = () => {
      dragIndexRef.current = index;
      setDraggingId(itemId);
      setPressReadyId(null);
    };
    if (e.touches) {
      longPressTimerRef.current = setTimeout(activate, 180);
      return;
    }
    e.preventDefault();
    activate();
  }

  function moveDrag(e){
    if(!draggingId || !activeRoom?.items?.length) return;
    const point = e.touches ? e.touches[0] : e;
    e.preventDefault && e.preventDefault();
    const els = Array.from(document.querySelectorAll('[data-item-sort-index]'));
    if (!els.length) return;
    const y = point.clientY;
    let targetIndex = dragIndexRef.current;
    els.forEach((el, idx) => {
      const rect = el.getBoundingClientRect();
      if (y > rect.top && y < rect.bottom) targetIndex = idx;
    });
    if (targetIndex !== dragIndexRef.current) {
      reorderRoomItems(dragIndexRef.current, targetIndex);
      dragIndexRef.current = targetIndex;
    }
  }

  function endDrag(){
    clearTimeout(longPressTimerRef.current);
    longPressTimerRef.current = null;
    setDraggingId(null);
    setPressReadyId(null);
    dragIndexRef.current = null;
  }

  function handleItemDoubleClick(itemId){
    if (!draggingId) goItem(itemId);
  }

  function updateHueFromClientX(clientX){
    const rect = colorBarRef.current.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    setSelectedNature(null);
    setCustomTheme(prev => ({ ...prev, hue: Math.round(ratio * 360) }));
    setThemeKey("custom");
  }

  function updateCustomThemeField(key, value){
    setSelectedNature(null);
    setThemeKey("custom");
    setCustomTheme(prev => ({ ...prev, [key]: Number(value) }));
  }

  function handleThemeColorPick(hex){
    const next = hexToHsl(hex);
    setThemePickerHex(hex);
    setSelectedNature(null);
    setCustomTheme(next);
    setThemeKey("custom");
  }

  function chooseNature(p){
    setSelectedNature(p.name);
    setCustomTheme({ hue:p.hue, sat:p.sat, light:p.light });
    setThemeKey("custom");
  }

  const activeItemMeta = activeItem ? (ACQUISITION_OPTIONS[activeItem.acquisitionType] || ACQUISITION_OPTIONS["Satın alındı"]) : null;

  return (
    <div className="app" onClick={()=>{ if(revealedSceneId) setRevealedSceneId(null); if(revealedRoomId) setRevealedRoomId(null); }}>
      {view==="home" && <>
        <TopBar
          title="Eşyamın Hayatı"
          sub={`${allItems.length} eşya · ₺${totalValue}`}
          right={<button className="btn btn-primary" onClick={(e)=>{ e.stopPropagation(); setModal("scene"); }}>+ Başlık</button>}
        />

        <div className="container">
          <div className="theme-title-row" onClick={()=>setThemeLibraryOpen(v=>!v)}>
            <div className="theme-title-text">Tema</div>
            <button className="btn btn-dark">{themeLibraryOpen ? "Kapat" : "Aç"}</button>
          </div>

          {themeLibraryOpen && <div className="hero" style={{cursor:"default"}}>
            {Object.entries(THEME_GROUPS).map(([groupName, group]) => (
              <div key={groupName}>
                <div className="theme-section-title">{groupName}</div>
                <div className="theme-grid">
                  {Object.entries(group).map(([key, theme]) => (
                    <div key={key} className={`theme-card ${themeKey===key ? 'active' : ''}`} onClick={()=>setThemeKey(key)}>
                      <div className="theme-preview" style={{background:`linear-gradient(135deg, ${theme.accent}, ${theme.accent2})`}} />
                      <div>
                        <div style={{fontWeight:700}}>{theme.label}</div>
                        <div className="muted">{groupName}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}

            <div className="color-lab">
              <div style={{fontWeight:700}}>Sonsuz Renk Seçimi</div>

              <div
                ref={colorBarRef}
                style={{
                  width:"100%",
                  height:"42px",
                  borderRadius:"999px",
                  position:"relative",
                  cursor:"crosshair",
                  border:"1px solid rgba(255,255,255,.18)",
                  marginTop:"12px",
                  background:"linear-gradient(90deg,hsl(0 95% 58%),hsl(15 95% 58%),hsl(30 95% 58%),hsl(45 95% 58%),hsl(60 95% 58%),hsl(90 90% 50%),hsl(120 78% 46%),hsl(150 75% 44%),hsl(180 82% 44%),hsl(210 85% 56%),hsl(240 85% 62%),hsl(270 82% 62%),hsl(300 80% 60%),hsl(330 82% 60%),hsl(360 95% 58%))"
                }}
                onPointerDown={(e)=>updateHueFromClientX(e.clientX)}
                onPointerMove={(e)=>{ if(e.buttons===1) updateHueFromClientX(e.clientX); }}
                onTouchStart={(e)=>{ if(e.touches[0]) updateHueFromClientX(e.touches[0].clientX); }}
                onTouchMove={(e)=>{ if(e.touches[0]) updateHueFromClientX(e.touches[0].clientX); }}
              >
                <div
                  style={{
                    position:"absolute",
                    top:"50%",
                    left:`${(customTheme.hue/360)*100}%`,
                    transform:"translate(-50%,-50%)",
                    width:"22px",
                    height:"22px",
                    borderRadius:"999px",
                    border:"3px solid #fff",
                    boxShadow:"0 0 0 2px rgba(0,0,0,.25)",
                    background:`hsl(${customTheme.hue} ${customTheme.sat}% ${customTheme.light}%)`
                  }}
                />
              </div>

              <div className="theme-custom-grid">
                <input
                  className="theme-color-picker"
                  type="color"
                  value={themePickerHex}
                  onChange={(e)=>handleThemeColorPick(e.target.value)}
                  title="Özel renk seç"
                />

                <div className="theme-slider-stack">
                  <div className="theme-slider-row">
                    <div className="muted">Ton</div>
                    <input
                      type="range"
                      min="0"
                      max="360"
                      value={customTheme.hue}
                      onChange={(e)=>updateCustomThemeField("hue", e.target.value)}
                    />
                    <div className="theme-slider-value">{customTheme.hue}</div>
                  </div>

                  <div className="theme-slider-row">
                    <div className="muted">Canlılık</div>
                    <input
                      type="range"
                      min="20"
                      max="100"
                      value={customTheme.sat}
                      onChange={(e)=>updateCustomThemeField("sat", e.target.value)}
                    />
                    <div className="theme-slider-value">%{customTheme.sat}</div>
                  </div>

                  <div className="theme-slider-row">
                    <div className="muted">Parlaklık</div>
                    <input
                      type="range"
                      min="20"
                      max="80"
                      value={customTheme.light}
                      onChange={(e)=>updateCustomThemeField("light", e.target.value)}
                    />
                    <div className="theme-slider-value">%{customTheme.light}</div>
                  </div>
                </div>
              </div>

              <div className="nature-grid">
                {NATURE_PALETTE.map(p => (
                  <div key={p.name} className={`nature-chip ${selectedNature===p.name ? 'active' : ''}`} onClick={()=>chooseNature(p)}>
                    <div className="nature-swatch" style={{ background:`hsl(${p.hue} ${p.sat}% ${p.light}%)` }} />
                    <div>
                      <div style={{fontWeight:700}}>{p.name}</div>
                      <div className="muted">{p.hue}° ton</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>}

          {scenes.map(s =>
            <div key={s.id} onClick={(e)=>e.stopPropagation()}>
              <SceneSwipeCard
                scene={s}
                isRevealed={revealedSceneId===s.id}
                onReveal={(id)=>setRevealedSceneId(id)}
                onClose={()=>setRevealedSceneId(null)}
                onOpen={()=>goScene(s.id)}
                onEdit={()=>{
                  setActiveSceneId(s.id);
                  setSceneEditName(s.name);
                  setModal("sceneEdit");
                }}
                onDelete={()=>setSceneDeleteConfirm(s.id)}
              />
            </div>
          )}
        </div>

        {modal==="scene" &&
          <Modal title="Yeni Başlık" onClose={()=>setModal(null)}>
            <label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneName} onChange={e=>setSceneName(e.target.value)} /></label>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={addScene}>Oluştur</button>
          </Modal>
        }

        {modal==="sceneEdit" &&
          <Modal title="Ana Başlığı Düzenle" onClose={()=>setModal(null)}>
            <label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneEditName} onChange={e=>setSceneEditName(e.target.value)} /></label>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={saveSceneEdit}>Kaydet</button>
          </Modal>
        }

        {sceneDeleteConfirm &&
          <Modal title="Ana Başlığı Sil" onClose={()=>setSceneDeleteConfirm(null)}>
            <div className="muted" style={{marginBottom:16}}>Bu ana başlık silinecek. Emin misin?</div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-dark" style={{flex:1}} onClick={()=>setSceneDeleteConfirm(null)}>Vazgeç</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={deleteScene}>Sil</button>
            </div>
          </Modal>
        }
      </>}

      {view==="scene" && activeScene && <>
        <TopBar
          title={activeScene.name}
          sub="Başlık paneli"
          onBack={()=>setView("home")}
          right={<button className="btn btn-primary" onClick={()=>setModal("room")}>+ Alt Başlık</button>}
          menuActions={[
            {
              label:"Başlığı Düzenle",
              onClick:()=>{
                setSceneEditName(activeScene.name);
                setModal("sceneEdit");
              }
            },
            {
              label:"Başlığı Sil",
              danger:true,
              onClick:()=>setSceneDeleteConfirm(activeScene.id)
            }
          ]}
        />

        <div className="container">
          {activeScene.subs.map(r =>
            <div key={r.id} onClick={(e)=>e.stopPropagation()}>
              <RoomSwipeCard
                room={r}
                isRevealed={revealedRoomId===r.id}
                onReveal={(id)=>setRevealedRoomId(id)}
                onClose={()=>setRevealedRoomId(null)}
                onOpen={()=>goRoom(r.id)}
                onEdit={()=>editRoom(r)}
                onDelete={()=>setRoomDeleteConfirm(r.id)}
              />
            </div>
          )}
        </div>

        {modal==="room" &&
          <Modal title="Yeni Alt Başlık" onClose={()=>setModal(null)}>
            <label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={addRoom}>Ekle</button>
          </Modal>
        }

        {modal==="sceneEdit" &&
          <Modal title="Ana Başlığı Düzenle" onClose={()=>setModal(null)}>
            <label><div className="muted" style={{marginBottom:4}}>Başlık Adı</div><input value={sceneEditName} onChange={e=>setSceneEditName(e.target.value)} /></label>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={saveSceneEdit}>Kaydet</button>
          </Modal>
        }

        {modal==="roomEdit" &&
          <Modal title="Alt Başlığı Düzenle" onClose={()=>setModal(null)}>
            <label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={saveRoomEdit}>Kaydet</button>
          </Modal>
        }

        {sceneDeleteConfirm &&
          <Modal title="Ana Başlığı Sil" onClose={()=>setSceneDeleteConfirm(null)}>
            <div className="muted" style={{marginBottom:16}}>Bu ana başlık silinecek. Emin misin?</div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-dark" style={{flex:1}} onClick={()=>setSceneDeleteConfirm(null)}>Vazgeç</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={deleteScene}>Sil</button>
            </div>
          </Modal>
        }

        {roomDeleteConfirm &&
          <Modal title="Alt Başlığı Sil" onClose={()=>setRoomDeleteConfirm(null)}>
            <div className="muted" style={{marginBottom:16}}>Bu alt başlık silinecek. Emin misin?</div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-dark" style={{flex:1}} onClick={()=>setRoomDeleteConfirm(null)}>Vazgeç</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={deleteRoom}>Sil</button>
            </div>
          </Modal>
        }
      </>}

      {view==="room" && activeRoom && <>
        <TopBar
          title={activeRoom.name}
          sub="Basılı tutup yukarı aşağı taşı · açmak için dokun"
          onBack={()=>setView("scene")}
          right={<button className="btn btn-primary" onClick={()=>setModal("item")}>+ Eşya</button>}
          menuActions={[
            {
              label:"Alt Başlığı Düzenle",
              onClick:()=>{
                setRoomName(activeRoom.name);
                setModal("roomEdit");
              }
            },
            {
              label:"Alt Başlığı Sil",
              danger:true,
              onClick:()=>setRoomDeleteConfirm(activeRoom.id)
            }
          ]}
        />

        <div className="container">
          <div className="item-list" onMouseMove={moveDrag} onMouseUp={endDrag} onMouseLeave={endDrag} onTouchMove={moveDrag} onTouchEnd={endDrag}>
            {activeRoom.items.map((item, index)=>(
              <div key={item.id} data-item-sort-index={index}>
                <ItemSortableCard
                  item={item}
                  isDragging={draggingId===item.id}
                  isPressReady={pressReadyId===item.id}
                  onPointerDown={(e)=>startDrag(item.id, index, e)}
                  onTouchStart={(e)=>startDrag(item.id, index, e)}
                  onPressCancel={()=>{ if(!draggingId) endDrag(); }}
                  onOpen={()=>handleItemDoubleClick(item.id)}
                />
              </div>
            ))}
            {activeRoom.items.length===0 && <div className="section"><div className="muted">Bu alanda henüz eşya yok</div></div>}
          </div>
        </div>

        {modal==="item" &&
          <Modal title="Yeni Eşya" onClose={()=>setModal(null)}>
            <ItemForm form={itemForm} setForm={setItemForm} />
            <button className="btn btn-primary" style={{width:"100%"}} onClick={addItem}>Kaydet</button>
          </Modal>
        }

        {modal==="roomEdit" &&
          <Modal title="Alt Başlığı Düzenle" onClose={()=>setModal(null)}>
            <label><div className="muted" style={{marginBottom:4}}>Alt Başlık Adı</div><input value={roomName} onChange={e=>setRoomName(e.target.value)} /></label>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={saveRoomEdit}>Kaydet</button>
          </Modal>
        }

        {roomDeleteConfirm &&
          <Modal title="Alt Başlığı Sil" onClose={()=>setRoomDeleteConfirm(null)}>
            <div className="muted" style={{marginBottom:16}}>Bu alt başlık silinecek. Emin misin?</div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-dark" style={{flex:1}} onClick={()=>setRoomDeleteConfirm(null)}>Vazgeç</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={deleteRoom}>Sil</button>
            </div>
          </Modal>
        }
      </>}

      {view==="item" && activeItem && <>
        <TopBar
          title={activeItem.name}
          sub="Eşyanın detayları"
          onBack={()=>setView("room")}
          right={
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-danger" onClick={()=>setDeleteConfirm(activeItem.id)}>Sil</button>
              <button
                className="btn btn-primary"
                onClick={()=>{
                  setEditForm({
                    ...activeItem,
                    selectedName:activeItem.name,
                    customName:activeItem.name,
                    invoiceFiles:[]
                  });
                  setModal("edit");
                }}
              >Düzenle modu</button>
            </div>
          }
        />

        <div className="container">
          <div className="card" style={{cursor:"default"}}>
            <div style={{display:"flex", justifyContent:"center", marginBottom:12}}>
              <div className="item-banner-icon" style={{width:104,height:104}}>
                <ProductIcon item={activeItem} />
              </div>
            </div>
            <div style={{fontWeight:700,marginTop:8}}>{activeItem.name}</div>
            {activeItem.category && <div className="muted" style={{marginTop:4}}>Kategori: {activeItem.category}</div>}
            {activeItem.brand && <div className="muted" style={{marginTop:4}}>Marka: {activeItem.brand}</div>}
            {activeItem.modelName && <div className="muted" style={{marginTop:4}}>Model: {activeItem.modelName}</div>}
            {activeItem.modelNumber && <div className="muted" style={{marginTop:4}}>Model numarası: {activeItem.modelNumber}</div>}
            {activeItem.serialNo && <div className="muted" style={{marginTop:4}}>Seri no: {activeItem.serialNo}</div>}
            {activeItem.color && <div className="muted" style={{marginTop:4}}>Renk: {activeItem.color}</div>}
          </div>

          <div className="grid3">
            <div className="mini"><div className="muted">Üretim Tarihi</div><div>{activeItem.productionDate || "-"}</div></div>
            <div className="mini"><div className="muted">Nereden / Kimden Alındı</div><div>{activeItem.acquiredFrom || "-"}</div></div>
            <div className="mini"><div className="muted">Alınma Yöntemi</div><div>{activeItem.acquisitionType || "-"}</div></div>
            <div className="mini"><div className="muted">Kaçıncı Sahip</div><div>{activeItem.ownerNumber || "-"}</div></div>
            <div className="mini"><div className="muted">İlk Alınma Tarihi</div><div>{activeItem.firstOwnerPurchaseDate || "-"}</div></div>
            <div className="mini"><div className="muted">Sizin Aldığınız Tarih</div><div>{activeItem.acquiredByUserDate || "-"}</div></div>
            <div className="mini"><div className="muted">Üretici Garantisi</div><div>{activeItem.manufacturerWarrantyDuration || "-"}</div></div>
            <div className="mini"><div className="muted">Ek Garanti</div><div>{activeItem.extraWarrantyDuration || "-"}</div></div>
            <div className="mini"><div className="muted">Kalan Garanti</div><div>{activeItem.remainingWarrantyText || calculateRemainingWarrantyText(activeItem)}</div></div>
            <div className="mini"><div className="muted">Kullanım Durumu</div><div>{activeItem.usageStatus || "-"}</div></div>
            <div className="mini"><div className="muted">Tutar</div><div>{formatCurrency(activeItem.purchaseAmount || activeItem.rentalAmount || activeItem.purchasePrice, activeItem.purchaseCurrency || activeItem.rentalCurrency || "TRY")}</div></div>
            <div className="mini"><div className="muted">Tür</div><div>{activeItem.type || "-"}</div></div>
          </div>

          {activeItem.acquisitionType === "Satın alındı" && (
            <div className="grid2" style={{marginTop:8}}>
              <div className="mini"><div className="muted">Satın Alma Tutarı</div><div>{formatCurrency(activeItem.purchaseAmount, activeItem.purchaseCurrency || "TRY")}</div></div>
              <div className="mini"><div className="muted">Para Birimi</div><div>{activeItem.purchaseCurrency || "-"}</div></div>
            </div>
          )}

          {activeItem.acquisitionType === "Kiralandı" && (
            <div className="grid2" style={{marginTop:8}}>
              <div className="mini"><div className="muted">Kiralama Tutarı</div><div>{formatCurrency(activeItem.rentalAmount, activeItem.rentalCurrency || "TRY")}</div></div>
              <div className="mini"><div className="muted">Para Birimi</div><div>{activeItem.rentalCurrency || "-"}</div></div>
            </div>
          )}

          {activeItem.acquisitionType === "Takas yapıldı" && (
            <div className="section">
              <div style={{fontWeight:700,marginBottom:8}}>Takas Bilgisi</div>
              <div className="muted">{activeItem.tradeAgainst || "-"}</div>
            </div>
          )}

          {activeItem.acquisitionType === "Hediye geldi" && (
            <div className="section">
              <div style={{fontWeight:700,marginBottom:8}}>Hediye Bilgisi</div>
              <div className="muted">{activeItem.giftFrom || "-"}</div>
            </div>
          )}

          {activeItem.acquisitionType === "Miras kaldı" && (
            <div className="section">
              <div style={{fontWeight:700,marginBottom:8}}>Miras Bilgisi</div>
              <div className="muted">{activeItem.inheritanceFrom || "-"}</div>
            </div>
          )}

          <div className="section">
            <div style={{fontWeight:700,marginBottom:8}}>Belgeler</div>
            {(activeItem.docs || []).length === 0 && <div className="muted">Belge yok</div>}
            {(activeItem.docs || []).map(d => (
              <span key={d.id} className="doc-pill" onClick={()=>setFilePreview(d)}>
                {d.type}: {d.name}
              </span>
            ))}
          </div>

          <ServiceForm serviceForm={serviceForm} setServiceForm={setServiceForm} onAdd={addServiceRecord} />

          <div className="section">
            <div style={{fontWeight:700,marginBottom:8}}>Servis Geçmişi</div>
            {(activeItem.services || []).length === 0 && <div className="muted">Servis kaydı yok</div>}
            {(activeItem.services || []).map(s => (
              <div key={s.id} className="service-card">
                <div><b>{s.date}</b> · {s.status}</div>
                {s.issue && <div className="muted" style={{marginTop:4}}>Arıza: {s.issue}</div>}
                {s.serviceName && <div className="muted" style={{marginTop:4}}>Servis: {s.serviceName}</div>}
                {s.serviceNote && <div className="muted" style={{marginTop:4}}>Not: {s.serviceNote}</div>}
                {s.changed && <div className="muted" style={{marginTop:4}}>Değişim: {s.changedProductName || "-"} / {s.changedModelName || "-"} / {s.changedSerialNo || "-"}</div>}
              </div>
            ))}
          </div>
        </div>

        {modal==="edit" &&
          <Modal title="Eşyayı Düzenle" onClose={()=>setModal(null)}>
            <ItemForm form={editForm} setForm={setEditForm} />
            <button className="btn btn-primary" style={{width:"100%"}} onClick={saveEdit}>Güncelle</button>
          </Modal>
        }

        {deleteConfirm &&
          <Modal title="Eşyayı Sil" onClose={()=>setDeleteConfirm(null)}>
            <div className="muted" style={{marginBottom:16}}>Bu eşyayı silmek istediğine emin misin?</div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-dark" onClick={()=>setDeleteConfirm(null)} style={{flex:1}}>Vazgeç</button>
              <button className="btn btn-danger" onClick={deleteActiveItem} style={{flex:1}}>Sil</button>
            </div>
          </Modal>
        }

        {filePreview &&
          <Modal title={filePreview.name} onClose={()=>setFilePreview(null)}>
            <iframe className="file-view" src={filePreview.url}></iframe>
          </Modal>
        }
      </>}
    </div>
  );
}

function applyTheme(theme){
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => {
    if(k !== "label") root.style.setProperty(`--${k}`, v);
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
